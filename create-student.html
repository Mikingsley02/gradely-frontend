  <style>

}

.form-card,
.bulk-upload{
  max-width:550px;
  width:100%;

  overflow:hidden;
  background:rgba(255,255,255,.9);
  border:1px solid rgba(255,255,255,.25);

.form-header{

  color:#fff;
  padding:32px 24px;

}

.form-header h2{
  font-size:1.65rem;
  font-weight:900;
}

.form-header p{
  margin-top:6px;
  color:#dbeafe;
}

.form-body,
.bulk-upload{
  padding:30px;
}

.bulk-upload h3{
  font-weight:900;
  margin-bottom:8px;
}

.bulk-upload p{

  margin-bottom:18px;
}

.form-group{
  margin-bottom:18px;
  position:relative;
}

label{
  display:block;
  font-weight:900;
  margin-bottom:7px;
}

input{
  width:100%;
  min-height:52px;
  padding:0 14px;
  border:1px solid #cbd5e1;
  border-radius:16px;
  font-size:1rem;
  outline:none;
  background:#fff;
}

input:focus{
  border-color:#22c55e;
  box-shadow:0 0 0 5px rgba(34,197,94,.14);
}

.toggle-password{
  position:absolute;
  right:15px;
  top:40px;
  cursor:pointer;
}

.form-actions{
  display:flex;
  gap:12px;
  margin-top:10px;
}

button,
.bulk-upload a{
  width:100%;
  min-height:52px;
  padding:12px;
  border:none;
  border-radius:16px;
  font-size:1rem;
  font-weight:900;
  cursor:pointer;
  text-align:center;
  text-decoration:none;
  transition:.2s ease;
}

button:hover,
.bulk-upload a:hover{
  transform:translateY(-2px);
}

.btn-submit,
.bulk-upload button{
  background:linear-gradient(135deg,#22c55e,#2563eb);
  color:#fff;
}

.btn-cancel{
  background:#64748b;
  color:#fff;
}

.bulk-upload a{
  display:inline-flex!important;
  align-items:center;
  justify-content:center;
  background:#020617!important;
  color:#fff!important;
}

.message{
  margin-top:15px;
  text-align:center;
  min-height:22px;
  font-weight:800;
}

.error{color:#dc2626}
.success{color:#16a34a}

.footer{
  text-align:center;
  padding:18px 10px;
  font-size:.82rem;
  color:#e2e8f0;
}

.footer a{
  color:#00d2ff!important;
  text-decoration:none;
  font-weight:800;
}

@media(max-width:600px){
  body{padding:20px 10px}

  .form-card,
  .bulk-upload{
    border-radius:22px;
  }

  .form-header{
    padding:25px 16px;
  }

  .form-header h2{
    font-size:1.35rem;
  }

  .form-body,
  .bulk-upload{
    padding:22px 16px;
  }

  .form-actions{
    flex-direction:column;
  }

  input,
  button,
  .bulk-upload a{
    font-size:16px;
  }

</style>
</head>

<body>

<!-- ================= SINGLE STUDENT ================= -->
<div class="form-card">
  <div class="form-header">
    <h2>➕ Create Student Account</h2>
    <p>Register a new student</p>
    <p id="studentCounter" style="color:#e74c3c; font-weight:600; margin-top:5px; display:none;"></p>
  </div>

  <div class="form-body">
    <form id="createForm">

      <div class="form-group">
        <label>Student ID *</label>
        <input type="text" name="student_id" required />
      </div>

      <div class="form-group">
        <label>First Name *</label>
        <input type="text" name="first_name" required />
      </div>

      <div class="form-group">
        <label>Middle Name</label>
        <input type="text" name="middle_name" />
      </div>

      <div class="form-group">
        <label>Last Name *</label>
        <input type="text" name="last_name" required />
      </div>

    <div class="form-group">
      <label>Phone Number *</label>
      <input type="text" name="phone" required />
    </div>


      <div class="form-group">
        <label>Parent Email</label>
        <input type="email" name="parent_email" />
      </div>

      <div class="form-group">
        <label>Password *</label>
        <input type="password" id="password" name="password" required />
        <span class="toggle-password" onclick="togglePassword('password', this)">👁️</span>
      </div>

      <div class="form-group">
        <label>Confirm Password *</label>
        <input type="password" id="confirm_password" required />
        <span class="toggle-password" onclick="togglePassword('confirm_password', this)">👁️</span>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-cancel" onclick="goBack()">Cancel</button>
        <button type="submit" class="btn-submit">Create Account</button>
      </div>

      <div class="message" id="message"></div>
    </form>
  </div>
</div>

<!-- ================= BULK UPLOAD ================= -->
<div class="bulk-upload">
  <h3>📂 Bulk Upload Students</h3>
  <p>Download the Excel template and upload student data in bulk.</p>

  <input type="file" id="bulkFile" accept=".csv,.xls,.xlsx" />

  <button style="margin-bottom: 10px;" onclick="downloadStudentTemplate()">
  ⬇️ Download Template
  </button>

    <button onclick="uploadBulkStudents()">
    📤 Upload Students
    </button>


  <div style="text-align:center; margin-top:10px;">
    <a href="manage-students.html"
       style="display:inline-block; background:#0c2461; color:white; padding:10px 10px; border-radius:6px; text-decoration:none; font-weight:600;">
       ← Back to Manage Students
    </a>
  </div>

  <div class="message" id="bulkMessage"></div>
</div>

<div class="footer">
  &copy; 2026 <strong>gradely.info</strong>. All rights reserved.
  <div style="margin-top: 10px;">
    <a href="terms.html" style="color:#00d2ff; margin:0 10px;">Terms</a> •
    <a href="privacy.html" style="color:#00d2ff; margin:0 10px;">Privacy</a> •
    <a href="refund-policy.html" style="color:#00d2ff; margin:0 10px;">Refund Policy</a>
  </div>
</div>

<script>
const API_BASE = "https://api.gradely.info";

// ===============================
// JWT AUTH HELPERS
// ===============================
function getToken() {
  const token =
    sessionStorage.getItem("gradely_token") ||
    localStorage.getItem("gradely_token");

  if (!token || token === "null" || token === "undefined" || token.trim() === "") {
    return null;
  }

  return token;
}

function getSchoolId() {
  return (
    sessionStorage.getItem("school_id") ||
    localStorage.getItem("school_id") ||
    sessionStorage.getItem("admin_id") ||
    sessionStorage.getItem("adminId") ||
    localStorage.getItem("admin_id") ||
    localStorage.getItem("adminId")
  );
}

function clearAuth() {
  sessionStorage.removeItem("gradely_token");
  sessionStorage.removeItem("school_id");
  sessionStorage.removeItem("adminId");
  sessionStorage.removeItem("admin_id");

  localStorage.removeItem("gradely_token");
  localStorage.removeItem("school_id");
  localStorage.removeItem("adminId");
  localStorage.removeItem("admin_id");
}

function redirectToLogin() {
  clearAuth();
  window.location.href = "admin-login.html";
}

function getAuthHeaders(extraHeaders = {}) {
  return {
    "Content-Type": "application/json",
    Authorization: `Bearer ${getToken()}`,
    ...extraHeaders
  };
}

async function authFetch(url, options = {}) {
  if (!getToken()) {
    redirectToLogin();
    return null;
  }

  const res = await fetch(url, {
    ...options,
    headers: {
      ...getAuthHeaders(),
      ...(options.headers || {})
    }
  });

  if (res.status === 401) {
    redirectToLogin();
    return null;
  }

  if (!res.ok) {
    let message = `HTTP ${res.status}`;

    try {
      const errorData = await res.json();
      message = errorData.message || message;
    } catch (e) {}

    throw new Error(message);
  }

  return res;
}

// ===============================
// TOGGLE PASSWORD
// ===============================
function togglePassword(id, icon) {
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
  icon.textContent = input.type === "password" ? "👁️" : "🙈";
}

// ===============================
// CREATE SINGLE STUDENT
// ===============================
document.getElementById("createForm").onsubmit = async (e) => {
  e.preventDefault();

  const msg = document.getElementById("message");
  const schoolId = getSchoolId();

  if (!schoolId) {
    msg.className = "message error";
    msg.textContent = "❌ School ID not found. Please log in again.";
    return;
  }

  const password = document.getElementById("password").value;
  const confirm = document.getElementById("confirm_password").value;

  if (password !== confirm) {
    msg.className = "message error";
    msg.textContent = "❌ Passwords do not match.";
    return;
  }

  const data = Object.fromEntries(new FormData(e.target));

  data.school_id = schoolId;
  data.parent_email = data.parent_email
    ? data.parent_email.trim().toLowerCase()
    : null;

  msg.textContent = "⏳ Creating student...";
  msg.className = "message";

  try {
    const res = await authFetch(`${API_BASE}/api/students/register`, {
      method: "POST",
      body: JSON.stringify(data)
    });

    if (!res) return;

    const result = await res.json();

    msg.className = result.success ? "message success" : "message error";
    msg.textContent = result.message || "Completed.";

    if (result.success) {
      setTimeout(() => {
        window.location.href = "manage-students.html";
      }, 1500);
    }
  } catch (err) {
    console.error("Create student error:", err);
    msg.className = "message error";
    msg.textContent = "❌ Failed to create student: " + err.message;
  }
};

// ===============================
// BULK UPLOAD STUDENTS
// ===============================
async function uploadBulkStudents() {
  const file = document.getElementById("bulkFile").files[0];
  const msg = document.getElementById("bulkMessage");
  const schoolId = getSchoolId();

  if (!schoolId) {
    msg.className = "message error";
    msg.textContent = "❌ School ID not found. Please log in again.";
    return;
  }

  if (!file) {
    msg.className = "message error";
    msg.textContent = "⚠️ Please select a file.";
    return;
  }

  const reader = new FileReader();

  reader.onload = async (e) => {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), {
        type: "array"
      });

      const sheet = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

      if (!sheet.length) {
        msg.className = "message error";
        msg.textContent = "⚠️ The selected file is empty.";
        return;
      }

      const normalized = sheet.map(s => ({
        student_id: s.student_id,
        first_name: s.first_name,
        middle_name: s.middle_name || null,
        last_name: s.last_name,
        phone: s.phone || s.phone_number,
        parent_email: s.parent_email
          ? String(s.parent_email).trim().toLowerCase()
          : null,
        password: s.password,
        school_id: schoolId
      }));

      msg.className = "message";
      msg.textContent = "⏳ Uploading students...";

      const res = await authFetch(`${API_BASE}/api/students/bulk-upload`, {
        method: "POST",
        body: JSON.stringify({
          school_id: schoolId,
          students: normalized
        })
      });

      if (!res) return;

      const result = await res.json();

      msg.className = result.success ? "message success" : "message error";
      msg.textContent = result.success
        ? "✅ Upload successful"
        : result.message || "❌ Upload failed";

      if (result.success) {
        setTimeout(() => {
          window.location.href = "manage-students.html";
        }, 1500);
      }
    } catch (err) {
      console.error("Bulk upload error:", err);
      msg.className = "message error";
      msg.textContent = "❌ Upload failed: " + err.message;
    }
  };

  reader.readAsArrayBuffer(file);
}

// ===============================
// DOWNLOAD TEMPLATE
// ===============================
function downloadStudentTemplate() {
  const ws = XLSX.utils.aoa_to_sheet([
    [
      "student_id",
      "first_name",
      "middle_name",
      "last_name",
      "phone",
      "parent_email",
      "password"
    ],
    [
      "STU001",
      "Kaima",
      "",
      "Ifeanyi",
      "08012345678",
      "parent@mail.com",
      "12345678"
    ]
  ]);

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Students");
  XLSX.writeFile(wb, "Student_Bulk_Template.xlsx");
}

function goBack() {
  window.location.href = "manage-students.html";
}

// ===============================
// STUDENT USAGE COUNTER
// ===============================
async function showStudentUsage() {
  const counter = document.getElementById("studentCounter");
  const submitBtn = document.querySelector(".btn-submit");

  try {
    const res = await authFetch(`${API_BASE}/api/students/subscription/usage`, {
      method: "GET"
    });

    if (!res) return;

    const data = await res.json();

    if (!data.success) {
      throw new Error(data.message || "Failed to fetch usage");
    }

    const plan = data.data?.plan?.toLowerCase() || "basic";
    const used = data.data?.current ?? 0;
    const limit = data.data?.limit ?? 200;

    counter.style.display = "block";

    if (plan === "basic" || limit === 200) {
      counter.textContent = `🧑 Students registered: ${used} / ${limit}`;
      counter.style.color = "#e74c3c";

      if (used >= limit) {
        submitBtn.disabled = true;
        submitBtn.style.background = "#bdc3c7";
        submitBtn.textContent = "Limit reached – Upgrade to Pro";
        counter.textContent += " ⚠️ Maximum reached!";
      } else {
        submitBtn.disabled = false;
        submitBtn.style.background = "#3498db";
        submitBtn.textContent = "Create Account";
      }
    } else if (plan === "pro" || limit === -1) {
      counter.textContent = `🧑 Students registered: ${used} (Unlimited)`;
      counter.style.color = "#27ae60";

      submitBtn.disabled = false;
      submitBtn.style.background = "#3498db";
      submitBtn.textContent = "Create Account";
    }
  } catch (err) {
    console.error("❌ Could not fetch student usage:", err);

    if (counter) {
      counter.style.display = "block";
      counter.textContent = "🧑 Students registered: 0";
      counter.style.color = "#27ae60";
    }
  }
}

// ===============================
// PAGE LOAD
// ===============================
document.addEventListener("DOMContentLoaded", () => {
  if (!getToken()) {
    redirectToLogin();
    return;
  }

  showStudentUsage();
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💳 Secure Payment | Gradely</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>

  </style>
</head>
<body>


  <script src="https://js.paystack.co/v1/inline.js"></script>

  <script>
  console.log("=== PAY.HTML INIT ===");

  // ✅ FIXED: Add API_BASE constant (no trailing spaces)
  const API_BASE = "https://api.gradely.info";

  const params = new URLSearchParams(window.location.search);
  
  let plan = params.get("plan") || localStorage.getItem("selected_plan");

  // Normalize plan value
  if (plan) {
    plan = plan.toLowerCase();
  }

  // Validate plan
  if (!plan || !['basic', 'pro'].includes(plan)) {
    alert("Invalid or missing plan selection.");
    window.location.href = "plan-comparison.html";  // ✅ Better fallback
    throw new Error("No valid plan selected");
  }
  
  const isUpgrade = params.get("upgrade") === "true";
  const isRenewal = params.get("renew") === "true";

  // ✅ Get school_id from multiple sources (fallback chain)
  const school_id = params.get("school_id") 
    || localStorage.getItem("school_id") 
    || sessionStorage.getItem("school_id");

  if (!school_id) {
    alert("Session expired. Please return to subscription page.");
    window.location.href = "admin-login.html";
    throw new Error("No school_id found");
  }

  // ✅ PLAN DETAILS
  const PLAN_NAMES = {
    basic: 'Basic Plan',
    pro: 'Professional Plan'
  };

  const PLAN_PRICES = {
    basic: '₦83,900',
    pro: '₦89,700'
  };

  document.getElementById('planName').textContent = PLAN_NAMES[plan];
  document.getElementById('planPrice').textContent = PLAN_PRICES[plan];

  // ✅ FIXED: Payment handler with correct URL + session auth
  document.getElementById("paystackBtn").onclick = async () => {
    const btn = document.getElementById('paystackBtn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Initializing secure payment...';
    btn.disabled = true;

    try {
      // ✅ FIXED: Full API URL + session auth + include school_id
      const response = await fetch(`${API_BASE}/api/subscription/upgrade/initialize`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
          // ✅ NO Authorization header - session cookie handles auth
        },
        credentials: 'include',  // ✅ CRITICAL: sends session cookie
        body: JSON.stringify({ 
          plan, 
          school_id  // ✅ Required by backend
        })
      });

      const result = await response.json();

      if (!response.ok || !result.success || !result.authorization_url) {
        throw new Error(result.message || 'Payment initialization failed');
      }

      // Redirect to Paystack secure hosted page
      window.location.href = result.authorization_url;

    } catch (error) {
      console.error('Payment init error:', error);
      btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Payment Failed';
      btn.disabled = false;
      alert(`Could not start payment: ${error.message}. Please try again.`);
    }
  };

  // ✅ AFTER PAYMENT: Handle upgrade completion
  const paymentReference = params.get("reference");

  if (paymentReference && (isUpgrade || isRenewal)) {
    if (!sessionStorage.getItem(`upgrade_completed_${paymentReference}`)) {
      completePlanActivation(paymentReference);
      sessionStorage.setItem(`upgrade_completed_${paymentReference}`, 'true');
    }
  }

  async function completePlanActivation(reference) {
    const btn = document.getElementById('paystackBtn');
    btn.innerHTML = '<i class="fas fa-check-circle"></i> Finalizing subscription...';
    btn.disabled = true;

    try {
      // ✅ FIXED: Full API URLs + session auth
      const endpoint = isUpgrade
        ? `${API_BASE}/api/subscription/upgrade/complete`
        : `${API_BASE}/api/subscription/renew/complete`;

      const response = await fetch(endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
          // ✅ NO Authorization header
        },
        credentials: 'include',  // ✅ Send session cookie
        body: JSON.stringify({
          school_id: school_id,  // ✅ Include school_id
          payment_reference: reference,
          plan: plan
        })
      });

      const result = await response.json();

      if (result.success) {
        btn.innerHTML = '<i class="fas fa-check-circle"></i> Success! Redirecting...';

        setTimeout(() => {
          // Clean up session storage
          sessionStorage.removeItem("selected_plan");
          
          if (isUpgrade) {
            window.location.href = 'dashboard.html?upgrade_success=true';
          } else if (isRenewal) {
            window.location.href = 'dashboard.html?renewal_success=true';
          } else {
            window.location.href = 'dashboard.html';
          }
        }, 1500);

      } else {
        throw new Error(result.message || 'Activation failed');
      }

    } catch (error) {
      console.error('Activation error:', error);
      btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error finalizing subscription';
      btn.disabled = false;
      alert(`Could not activate subscription: ${error.message}\nReference: ${reference}`);
    }
  }
  </script>

  <script src="js/kaima-chatbot.js"></script>
  <script src="js/session-timeout.js"></script>
</body>
</html>

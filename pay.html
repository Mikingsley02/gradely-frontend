<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💳 Secure Payment | Gradely</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>

  </style>
</head>
<body>
<button id="paystackBtn">Loading...</button>

  <script src="https://js.paystack.co/v1/inline.js"></script>

  <script>
document.addEventListener("DOMContentLoaded", () => {
  console.log("=== PAY.HTML INIT ===");

  const API_BASE = "https://api.gradely.info";
  const btn = document.getElementById('paystackBtn');

  if (!btn) {
    console.error("❌ paystackBtn not found");
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const school_id =
    params.get("school_id") ||
    localStorage.getItem("school_id") ||
    sessionStorage.getItem("school_id");

  const paymentReference = params.get("reference");
  const isUpgrade = params.get("upgrade") === "true";

  if (!school_id) {
    alert("Session expired. Please log in again.");
    window.location.href = "admin-login.html";
    return;
  }

  // ================= CALLBACK HANDLER =================
  if (paymentReference && isUpgrade) {
    finalizeUpgrade(paymentReference);
    return;
  }

  // ================= LOAD CURRENT PLAN =================
  loadSubscription();

  async function loadSubscription() {
    try {
      const res = await fetch(`${API_BASE}/api/subscription/status`, {
        credentials: "include"
      });

      const data = await res.json();
      if (!data.success) throw new Error(data.message);

      if (data.plan === "basic") {
        btn.textContent = "Upgrade Plan";
        btn.onclick = () => upgradePlan("pro");
      } else {
        btn.textContent = "Downgrade Plan";
        btn.onclick = downgradePlan;
      }

    } catch (err) {
      console.error("Subscription load failed:", err);
    }
  }

  // ================= UPGRADE =================
  async function upgradePlan(plan) {
    btn.textContent = "Initializing...";
    btn.disabled = true;

    try {
      const res = await fetch(`${API_BASE}/api/subscription/upgrade/initialize`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ plan, school_id })
      });

      const data = await res.json();

      if (!data.success || !data.authorization_url) {
        throw new Error(data.message || "Payment init failed");
      }

      window.location.href = data.authorization_url;

    } catch (err) {
      console.error("Upgrade error:", err);
      btn.disabled = false;
      btn.textContent = "Upgrade Plan";
      alert(err.message);
    }
  }

  // ================= COMPLETE =================
  async function finalizeUpgrade(reference) {
    btn.textContent = "Finalizing...";
    btn.disabled = true;

    try {
      const res = await fetch(`${API_BASE}/api/subscription/upgrade/complete`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({
          school_id,
          payment_reference: reference
        })
      });

      const result = await res.json();

      if (!result.success) throw new Error(result.message);

      window.location.href = "dashboard.html?upgrade_success=true";

    } catch (err) {
      console.error("Finalize error:", err);
      alert(err.message);
      btn.disabled = false;
    }
  }

  // ================= DOWNGRADE =================
  async function downgradePlan() {
    if (!confirm("Proceed with downgrade?")) return;

    btn.textContent = "Processing...";
    btn.disabled = true;

    try {
      const res = await fetch(`${API_BASE}/api/subscription/downgrade`, {
        method: "POST",
        credentials: "include"
      });

      const data = await res.json();
      if (!data.success) throw new Error(data.message);

      alert(data.message);
      loadSubscription();
      btn.disabled = false;

    } catch (err) {
      alert(err.message);
      btn.disabled = false;
    }
  }

});
</script>


  <script src="js/kaima-chatbot.js"></script>
  <script src="js/session-timeout.js"></script>
</body>
</html>

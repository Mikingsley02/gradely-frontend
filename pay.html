<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💳 Secure Payment | Gradely</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>

  </style>
</head>
<body>


  <script src="https://js.paystack.co/v1/inline.js"></script>

 <script>
console.log("=== PAY.HTML INIT ===");

// ================= CONFIG =================
const API_BASE = "https://api.gradely.info";
const btn = document.getElementById('paystackBtn');

// Safely get DOM elements
const planNameEl = document.getElementById('planName');
const planPriceEl = document.getElementById('planPrice');

if (!btn || !planNameEl || !planPriceEl) {
  console.error("❌ Required DOM elements (#paystackBtn, #planName, #planPrice) not found");
  alert("Page not properly loaded. Please refresh.");
  throw new Error("Missing required DOM elements");
}

// ================= URL PARAMS =================
const params = new URLSearchParams(window.location.search);
const school_id = params.get("school_id") || localStorage.getItem("school_id") || sessionStorage.getItem("school_id");
const paymentReference = params.get("reference");
const isUpgrade = params.get("upgrade") === "true";
const planParam = params.get("plan");

if (!school_id) {
  alert("Session expired. Please log in again.");
  window.location.href = "admin-login.html";
  throw new Error("No school_id found");
}

// ================= PLAN DISPLAY =================
const PLAN_NAMES = { basic: "Basic Plan", pro: "Professional Plan" };
const PLAN_PRICES = { basic: "₦83,900", pro: "₦89,700" };

async function loadSubscription() {
  try {
    const res = await fetch(`${API_BASE}/api/subscription/status`, { credentials: "include" });
    const data = await res.json();

    if (!data.success) throw new Error(data.message || "Failed to load subscription");

    // If subscription expired
    if (!data.isActive) {
      alert("Your subscription has expired. Please subscribe to continue.");
      window.location.href = "plan-comparison.html";
      return;
    }

    const currentPlan = data.plan;
    planNameEl.textContent = PLAN_NAMES[currentPlan] || "Unknown Plan";
    planPriceEl.textContent = PLAN_PRICES[currentPlan] || "N/A";

    // Set button behavior
    if (currentPlan === "basic") {
      btn.textContent = "Upgrade Plan";
      btn.onclick = () => upgradePlan("pro");
    } else if (currentPlan === "pro") {
      btn.textContent = "Downgrade Plan";
      btn.onclick = downgradePlan;
    }

  } catch (err) {
    console.error("Failed to load subscription:", err);
    alert("Could not fetch subscription info. Refresh the page.");
  }
}

// ================= UPGRADE =================
async function upgradePlan(targetPlan) {
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Initializing...';
  btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/api/subscription/upgrade/initialize`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ plan: targetPlan, school_id })
    });

    const data = await res.json();
    if (!data.success || !data.authorization_url) throw new Error(data.message || "Payment init failed");

    // Redirect to Paystack
    window.location.href = data.authorization_url;

  } catch (err) {
    console.error("Upgrade error:", err);
    btn.innerHTML = "Upgrade Plan";
    btn.disabled = false;
    alert("Upgrade failed: " + err.message);
  }
}

// ================= DOWNGRADE =================
async function downgradePlan() {
  if (!confirm("You will lose Pro features immediately. Proceed?")) return;

  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
  btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/api/subscription/downgrade`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include"
    });

    const data = await res.json();
    if (!data.success) throw new Error(data.message || "Downgrade failed");

    alert(data.message);
    await loadSubscription();
    btn.disabled = false;

  } catch (err) {
    console.error("Downgrade error:", err);
    btn.innerHTML = "Downgrade Plan";
    btn.disabled = false;
    alert("Downgrade failed: " + err.message);
  }
}

// ================= AFTER PAYSTACK CALLBACK =================
if (paymentReference && isUpgrade) {
  finalizeUpgrade(paymentReference);
}

async function finalizeUpgrade(reference) {
  btn.innerHTML = '<i class="fas fa-check-circle"></i> Finalizing...';
  btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/api/subscription/upgrade/complete`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ school_id, payment_reference: reference })
    });

    const result = await res.json();
    if (result.success) {
      btn.innerHTML = '<i class="fas fa-check-circle"></i> Success!';
      setTimeout(() => {
        window.location.href = "dashboard.html?upgrade_success=true";
      }, 1500);
    } else {
      throw new Error(result.message || "Activation failed");
    }

  } catch (err) {
    console.error("Activation error:", err);
    btn.innerHTML = "Upgrade Plan";
    btn.disabled = false;
    alert("Could not activate upgrade: " + err.message);
  }
}

// ================= INITIAL LOAD =================
loadSubscription();
</script>


  <script src="js/kaima-chatbot.js"></script>
  <script src="js/session-timeout.js"></script>
</body>
</html>

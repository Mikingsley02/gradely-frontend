<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💳 Secure Payment | Gradely</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>

  </style>
</head>
<body>


  <script src="https://js.paystack.co/v1/inline.js"></script>

 <script>
console.log("=== PAY.HTML INIT ===");

const API_BASE = "https://api.gradely.info";
const btn = document.getElementById('paystackBtn');

// ================= LOAD SUBSCRIPTION =================
async function loadSubscription() {
  try {
    const res = await fetch(`${API_BASE}/subscription/status`, {
      method: "GET",
      credentials: "include"
    });

    const data = await res.json();

    if (!data.success) throw new Error(data.message || "Failed to load subscription");

    if (!data.isActive) {
      alert("Your subscription has expired. Please subscribe to continue.");
      window.location.href = "plan-comparison.html";
      return;
    }

    const plan = data.plan;

    document.getElementById('planName').textContent =
      plan === 'pro' ? 'Professional Plan' : 'Basic Plan';

    document.getElementById('planPrice').textContent =
      plan === 'pro' ? '₦89,700' : '₦83,900';

    if (plan === 'basic') {
      btn.textContent = 'Upgrade Plan';
      btn.onclick = upgradePlan;
    } else {
      btn.textContent = 'Downgrade Plan';
      btn.onclick = downgradePlan;
    }

  } catch (err) {
    console.error("Failed to load subscription:", err);
    alert("Failed to load subscription info. Please refresh.");
  }
}

// ================= UPGRADE =================
async function upgradePlan() {
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Initializing...';
  btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/subscription/upgrade`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ plan: 'pro' })
    });

    const data = await res.json();

    if (!data.success || !data.authorization_url) {
      throw new Error(data.message || "Payment initialization failed");
    }

    window.location.href = data.authorization_url;

  } catch (err) {
    console.error("Upgrade error:", err);
    btn.innerHTML = 'Upgrade Plan';
    btn.disabled = false;
    alert("Upgrade failed: " + err.message);
  }
}

// ================= DOWNGRADE =================
async function downgradePlan() {
  if (!confirm("You will lose Pro features immediately. Proceed?")) return;

  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
  btn.disabled = true;

  try {
    const res = await fetch(`${API_BASE}/subscription/downgrade`, {
      method: 'POST',
      credentials: 'include'
    });

    const data = await res.json();

    if (!data.success) throw new Error(data.message || "Downgrade failed");

    alert(data.message);
    btn.disabled = false;
    loadSubscription();

  } catch (err) {
    console.error("Downgrade error:", err);
    btn.innerHTML = 'Downgrade Plan';
    btn.disabled = false;
    alert("Downgrade failed: " + err.message);
  }
}

// ================= AFTER PAYMENT =================
const params = new URLSearchParams(window.location.search);
const paymentReference = params.get("reference");
const isUpgrade = params.get("upgrade") === "true";

if (paymentReference && isUpgrade) {
  completePlanActivation(paymentReference);
}

async function completePlanActivation(reference) {
  btn.innerHTML = '<i class="fas fa-check-circle"></i> Finalizing...';
  btn.disabled = true;

  try {
    const response = await fetch(`${API_BASE}/subscription/upgrade/complete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ payment_reference: reference })
    });

    const result = await response.json();

    if (!result.success) {
      throw new Error(result.message || 'Activation failed');
    }

    btn.innerHTML = '<i class="fas fa-check-circle"></i> Success!';

    setTimeout(() => {
      window.location.href = 'dashboard.html?upgrade_success=true';
    }, 1500);

  } catch (err) {
    console.error('Activation error:', err);
    btn.innerHTML = 'Upgrade Plan';
    btn.disabled = false;
    alert("Could not activate: " + err.message);
  }
}

// ================= INIT =================
loadSubscription();
</script>

  <script src="js/kaima-chatbot.js"></script>
  <script src="js/session-timeout.js"></script>
</body>
</html>

<html lang="en">
<head>

  <style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
  background:
    radial-gradient(circle at top left,rgba(34,197,94,.22),transparent 35%),
    radial-gradient(circle at bottom right,rgba(0,210,255,.24),transparent 35%),
    linear-gradient(135deg,#020617,#0f172a);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  color:#fff;
  padding:30px 14px 0;
}

.container{
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:30px;
  padding:36px 28px;
  width:100%;
  max-width:550px;

  margin:34px auto;
  text-align:center;
}

h2{
  font-size:1.75rem;
  font-weight:900;
  margin-bottom:8px;
}

p{

  font-size:.95rem;
  margin-bottom:24px;
}

form{
  display:flex;
  flex-direction:column;
  gap:15px;
  text-align:left;
}

label{
  font-weight:800;
  font-size:.9rem;
  color:#e0f2fe;
}

select,
input[type="file"],
input[type="text"],
button{
  width:100%;
  min-height:52px;
  border-radius:16px;
  font-size:1rem;
  outline:none;
}

select,
input[type="file"],
input[type="text"]{
  border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.14)!important;
  color:#fff!important;
  padding:0 14px!important;
}

select option{
  color:#111827;
}

select:focus,
input[type="text"]:focus{
  border-color:#22c55e;
  box-shadow:0 0 0 5px rgba(34,197,94,.16);
}

input[type="file"]{
  padding:10px;
  cursor:pointer;
}

input[type="file"]::file-selector-button{
  background:#22c55e;
  border:none;
  color:white;
  font-weight:900;
  padding:8px 14px;
  border-radius:12px;
  cursor:pointer;
  margin-right:10px;
}

button{
  border:none;
  background:linear-gradient(135deg,#22c55e,#2563eb);
  color:#fff;
  font-weight:900;
  cursor:pointer;
  transition:.2s ease;
}

button:hover{
  transform:translateY(-2px);
}

.download-btn{
  background:linear-gradient(135deg,#00d2ff,#2563eb);
}

.back-link{
  display:block;
  margin-top:24px;
  color:#00d2ff;
  text-decoration:none;
  font-weight:900;
  text-align:center;
}

.back-link:hover{
  color:#fff;
  text-decoration:underline;
}

.loader-overlay{
  position:fixed;
  inset:0;
  background:rgba(2,6,23,.78);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:#fff;
  z-index:9999;
  text-align:center;
  backdrop-filter:blur(8px);
}

.spinner{
  border:5px solid rgba(255,255,255,.22);
  border-top:5px solid #22c55e;
  border-radius:50%;
  width:54px;
  height:54px;
  animation:spin 1s linear infinite;
  margin-bottom:15px;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

footer{
  margin-top:auto;
  text-align:center;
  font-size:.82rem;
  color:#e2e8f0;
  width:100%;
  padding:22px 10px;
  background:rgba(0,0,0,.22);
  border-top:1px solid rgba(255,255,255,.14);
}

footer a{
  color:#00d2ff;
  text-decoration:none;
  margin:0 6px;
  font-weight:900;
}

#academicYear::placeholder{
  color:#c2e0ff!important;
  opacity:1;
}


.latest-upload-box{
  margin-top:24px;
  padding:18px;
  border-radius:20px;
  background:rgba(34,197,94,.14);
  border:1px solid rgba(34,197,94,.55);
  text-align:left;
  box-shadow:0 0 25px rgba(34,197,94,.22);
}

.live-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
  color:#86efac;
}

.live-dot{
  width:13px;
  height:13px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 0 0 rgba(34,197,94,.8);
  animation:livePulse 1.4s infinite;
}

@keyframes livePulse{
  0%{box-shadow:0 0 0 0 rgba(34,197,94,.8)}
  70%{box-shadow:0 0 0 12px rgba(34,197,94,0)}
  100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}
}


@media(max-width:600px){
  body{
    padding:18px 10px 0;
  }

  .container{
    padding:28px 16px;
    border-radius:24px;
    margin:20px auto 28px;
  }

  h2{
    font-size:1.42rem;
  }

  select,
  input[type="file"],
  input[type="text"],
  button{
    font-size:16px;
  }

  }

</style>

  <!-- Academic year placeholder styling -->
  <style>
    #academicYear::placeholder {
      color: #c2e0ff !important;
      opacity: 1;
    }
    #academicYear:-ms-input-placeholder { color: #c2e0ff; }
    #academicYear::-ms-input-placeholder { color: #c2e0ff; }
  </style>
</head>
<body>

  <div class="container">
    <h2>📊 Upload Student Results</h2>
    <p>Upload your result sheet using the provided Excel template.</p>
    <form id="resultForm">
      <label for="term">Select Term *</label>
      <select id="term" required>
        <option value="">-- Select Term --</option>
        <option value="1st Term">1st Term</option>
        <option value="2nd Term">2nd Term</option>
        <option value="3rd Term">3rd Term</option>
      </select>

      <label for="academicYear">Academic Year *</label>
      <input 
        type="text" 
        id="academicYear" 
        placeholder="e.g., 2024/2025" 
        required 
        style="background: rgba(255, 255, 255, 0.15); color: #fff; border: none; border-radius: 12px; height: 45px; padding: 0 15px; font-size: 1rem; outline: none;"
      />

      <label for="file">Upload Result File *</label>
      <input type="file" id="file" accept=".csv, .xls, .xlsx" required />

      <button type="button" class="download-btn" onclick="downloadTemplate()">⬇️ Download Excel Template</button>
      <button type="submit">📤 Upload Result</button>
    </form>


    <div id="latestUploadBox" class="latest-upload-box" style="display:none;">
  <div class="live-row">
    <span class="live-dot"></span>
    <strong>Live Result Upload</strong>
  </div>
  <p><strong>Academic Year:</strong> <span id="latestAcademicYear">-</span></p>
  <p><strong>Term:</strong> <span id="latestTerm">-</span></p>
</div>



    <a href="dashboard.html" class="back-link">⬅ Back to Dashboard</a>
  </div>

  <!-- Footer -->
  <footer>
    &copy; © <span class="currentYear"></span> <strong>gradely.info</strong> | Powered by RIS<br>
    <a href="terms.html">Terms</a> • 
    <a href="privacy.html">Privacy</a> • 
    <a href="refund-policy.html">Refund Policy</a>
  </footer>

  <!-- Loader overlay -->
  <div class="loader-overlay" id="loaderOverlay">
    <div class="spinner"></div>
    <p>Uploading results... please wait</p>
  </div>

  <script>
const backendUrl = "https://api.gradely.info";

function getToken() {
  const token =
    sessionStorage.getItem("gradely_token") ||
    localStorage.getItem("gradely_token");

  if (!token || token === "null" || token === "undefined" || token.trim() === "") {
    return null;
  }

  return token;
}

function getSchoolId() {
  return (
    sessionStorage.getItem("school_id") ||
    localStorage.getItem("school_id") ||
    sessionStorage.getItem("admin_id") ||
    sessionStorage.getItem("adminId") ||
    localStorage.getItem("admin_id") ||
    localStorage.getItem("adminId")
  );
}

function clearAuth() {
  sessionStorage.removeItem("gradely_token");
  sessionStorage.removeItem("school_id");
  sessionStorage.removeItem("adminId");
  sessionStorage.removeItem("admin_id");

  localStorage.removeItem("gradely_token");
  localStorage.removeItem("school_id");
  localStorage.removeItem("adminId");
  localStorage.removeItem("admin_id");
}

function redirectToLogin() {
  clearAuth();
  window.location.href = "admin-login.html";
}

function showLoader(show) {
  document.getElementById("loaderOverlay").style.display = show ? "flex" : "none";
}

function downloadTemplate() {
  const wb = XLSX.utils.book_new();

  const headers = ["student_id", "class", "section", "subject", "score", "grade", "remarks"];
  const example = ["STU001", "JSS 1", "A", "Mathematics", 85, "A", "Excellent"];

  const ws = XLSX.utils.aoa_to_sheet([headers, example]);
  XLSX.utils.book_append_sheet(wb, ws, "Result Template");
  XLSX.writeFile(wb, "Gradely_Result_Template.xlsx");
}

async function authFetch(url, options = {}) {
  const token = getToken();

  if (!token) {
    redirectToLogin();
    return null;
  }

  const res = await fetch(url, {
    ...options,
    headers: {
      Authorization: `Bearer ${token}`,
      ...(options.headers || {})
    }
  });

  if (res.status === 401) {
    redirectToLogin();
    return null;
  }

  return res;
}

document.getElementById("resultForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const term = document.getElementById("term").value.trim();
  const academic_year = document.getElementById("academicYear").value.trim();
  const file = document.getElementById("file").files[0];
  

  if (!term || !academic_year || !file) {
    alert("⚠️ Please fill in all required fields.");
    return;
  }

  try {
    showLoader(true);

    const reader = new FileReader();

    reader.onload = async (event) => {
      try {
        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, { type: "array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];

        let results = XLSX.utils.sheet_to_json(sheet);

        results = results.map(r => ({
          student_id: (r.student_id ?? "").toString().trim().toUpperCase(),
          class: (r.class ?? "").toString().trim(),
          section: (r.section ?? "").toString().trim(),
          subject: (r.subject ?? "").toString().trim(),
          score: Number(r.score),
          grade: r.grade || null,
          remarks: (r.remarks ?? "").toString().trim() || ""
        })).filter(r =>
          r.student_id &&
          r.class &&
          r.section &&
          r.subject &&
          !isNaN(r.score) &&
          r.score >= 0
        );

        if (results.length === 0) {
          showLoader(false);
          alert("⚠️ No valid rows found. Ensure columns are: student_id, class, section, subject, score.");
          return;
        }

        const response = await authFetch(`${backendUrl}/api/result/upload-results`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
          term,
          academic_year,
          results
        })
        });

        if (!response) return;

        const resData = await response.json().catch(() => ({
          success: false,
          message: "Invalid server response"
        }));

        showLoader(false);

        if (resData.success) {


  localStorage.setItem("latest_result_upload", JSON.stringify({
  term,
  academic_year,
  uploaded_at: new Date().toISOString()
}));

showLatestUpload(term, academic_year);


          alert("✅ " + (resData.message || "Upload complete!"));
          document.getElementById("resultForm").reset();
        } else {
          alert("⚠️ " + (resData.message || "Upload failed."));
        }
      } catch (err) {
        showLoader(false);
        console.error("Upload processing error:", err);
        alert("⚠️ Upload failed. Check console for details.");
      }
    };

    reader.readAsArrayBuffer(file);
  } catch (err) {
    showLoader(false);
    console.error("Upload error:", err);
    alert("⚠️ Upload failed. Check console for details.");
  }
});



function showLatestUpload(term, academicYear) {
  document.getElementById("latestUploadBox").style.display = "block";
  document.getElementById("latestTerm").textContent = term;
  document.getElementById("latestAcademicYear").textContent = academicYear;
}



document.addEventListener("DOMContentLoaded", () => {

  const latest = JSON.parse(localStorage.getItem("latest_result_upload") || "{}");
if (latest.term && latest.academic_year) {
  showLatestUpload(latest.term, latest.academic_year);
}


  if (!getToken()) {
    redirectToLogin();
  }
});
</script>

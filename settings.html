<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>⚙️ Settings | Gradely Info</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      margin: 0;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 30px 15px;
    }
    .settings-card {
      background: #fff;
      width: 100%;
      max-width: 500px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      overflow: hidden;
    }
    .settings-header {
      background: #0c2461;
      color: white;
      text-align: center;
      padding: 25px;
    }
    .settings-header h2 {
      margin: 0;
      font-size: 1.6rem;
      font-weight: 600;
    }
    .settings-body {
      padding: 25px;
    }
    .form-group {
      margin-bottom: 18px;
      position: relative;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #2c3e50;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 6px;
      border: 1px solid #bdc3c7;
      font-size: 1rem;
      box-sizing: border-box;
    }
    input:focus {
      border-color: #3498db;
      outline: none;
    }
    ::placeholder {
      color: #999;
      opacity: 1;
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 38px;
      cursor: pointer;
      user-select: none;
      color: #888;
      font-size: 1.1rem;
    }
    button {
      background: #3498db;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: 0.3s;
    }
    button:hover {
      background: #2980b9;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-weight: 600;
      color: #299aca;
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.3s;
    }
    .back-link:hover {
      color: #c0392b;
      text-decoration: underline;
    }
    .message {
      margin-top: 15px;
      text-align: center;
      font-size: 0.95rem;
      min-height: 20px;
    }
    .error { color: #e74c3c; }
    .success { color: #27ae60; }
    .footer {
      text-align: center;
      color: #eee;
      font-size: 0.8rem;
      margin-top: 30px;
    }
    .footer a {
      color: #00d2ff;
      text-decoration: none;
      margin: 0 8px;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="settings-card">
    <div class="settings-header">
      <h2>⚙️ School Settings</h2>
      <p>Update only the fields you want to change.</p>
    </div>

    <div class="settings-body">
      <form id="settingsForm">
        <div class="form-group">
          <label>School Name</label>
          <input type="text" name="school_name" id="school_name" placeholder="Enter school name" />
        </div>

        <div class="form-group">
          <label>School Email</label>
          <input type="email" name="email" id="email" placeholder="school@example.com" />
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" name="phone_number" id="phone_number" placeholder="08012345678" />
        </div>

        <div class="form-group">
          <label>Current Password</label>
          <input type="password" name="current_password" id="current_password" placeholder="Enter current password" />
          <span class="toggle-password" onclick="togglePassword('current_password', this)">👁️</span>
        </div>

        <div class="form-group">
          <label>New Password</label>
          <input type="password" name="new_password" id="new_password" placeholder="Enter new password" />
          <span class="toggle-password" onclick="togglePassword('new_password', this)">👁️</span>
        </div>

        <div class="form-group">
          <label>Confirm New Password</label>
          <input
            type="password"
            name="confirm_new_password"
            id="confirm_new_password"
            placeholder="Re-enter new password"
          />
          <span class="toggle-password"
            onclick="togglePassword('confirm_new_password', this)">👁️</span>
        </div>

        <button type="submit">💾 Save Changes</button>

        <a href="dashboard.html" class="back-link">← Back to Dashboard</a>

        <div id="message" class="message"></div>
      </form>
    </div>
  </div>

  <div class="footer">
    &copy; 2026 <strong>gradely.info</strong>. All rights reserved.<br/>
    <a href="terms.html">Terms</a> •
    <a href="privacy.html">Privacy</a> •
    <a href="refund-policy.html">Refund Policy</a>
  </div>

<script>
// ✅ FIXED: Clean API_BASE (NO trailing spaces)
const API_BASE = window.location.hostname.includes("localhost")
  ? "http://localhost:5000"
  : "https://api.gradely.info";

// ✅ Check if user is logged in (via session, not token)
function isLoggedIn() {
  // ✅ Check for school_id in localStorage (set during login)
  return !!(localStorage.getItem("school_id") || sessionStorage.getItem("school_id"));
}

// ✅ Early redirect if not logged in
if (!isLoggedIn()) {
  alert("⚠️ You are not logged in!");
  window.location.href = "admin-login.html";
}

document.addEventListener("DOMContentLoaded", loadSchoolData);

async function loadSchoolData() {
  const msgEl = document.getElementById("message");
  msgEl.textContent = "⏳ Loading settings...";
  msgEl.className = "message";

  // ✅ Removed token check - backend uses session cookies, not JWT
  
  try {
    const res = await fetch(`${API_BASE}/api/admin/settings/school-info`, {
      method: "GET",
      credentials: "include"  // ✅ Sends session cookie
    });

    if (res.status === 401) {
      alert("⚠️ Session expired. Please log in again.");
      window.location.href = "admin-login.html";
      return;
    }

    if (!res.ok) {
      const errorText = await res.text();
      console.error("❌ Failed to load settings:", res.status, errorText.substring(0, 200));
      throw new Error(`HTTP ${res.status}`);
    }

    const data = await res.json();

    document.getElementById("school_name").value = data.school?.school_name || "";
    document.getElementById("email").value = data.school?.email || "";
    document.getElementById("phone_number").value = data.school?.phone_number || "";

    msgEl.textContent = "";
  } catch (err) {
    console.error(err);
    msgEl.className = "message error";
    msgEl.textContent = "🚫 Unable to connect to server.";
  }
}

document.getElementById("settingsForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const msgEl = document.getElementById("message");
  msgEl.className = "message";
  msgEl.textContent = "⏳ Saving changes...";

  // ✅ Removed token check - backend uses session cookies, not JWT

  const payload = {};

  // ✅ Fixed: Use document.getElementById() for form fields
  const schoolNameEl = document.getElementById("school_name");
  const emailEl = document.getElementById("email");
  const phoneEl = document.getElementById("phone_number");
  const currentPasswordEl = document.getElementById("current_password");
  const newPasswordEl = document.getElementById("new_password");
  const confirmPasswordEl = document.getElementById("confirm_new_password");

  if (schoolNameEl.value.trim()) payload.school_name = schoolNameEl.value.trim();
  if (emailEl.value.trim()) payload.email = emailEl.value.trim();
  if (phoneEl.value.trim()) payload.phone_number = phoneEl.value.trim();

  const currentPassword = currentPasswordEl.value.trim();
  const newPassword = newPasswordEl.value.trim();
  const confirmPassword = confirmPasswordEl.value.trim();

  if (currentPassword || newPassword || confirmPassword) {
    if (!currentPassword || !newPassword || !confirmPassword) {
      msgEl.className = "message error";
      msgEl.textContent = "❌ Fill all password fields.";
      return;
    }
    if (newPassword !== confirmPassword) {
      msgEl.className = "message error";
      msgEl.textContent = "❌ Passwords do not match.";
      return;
    }

    payload.current_password = currentPassword;
    payload.new_password = newPassword;
  }

  try {
    const res = await fetch(`${API_BASE}/api/admin/settings/school-info`, {
      method: "PUT",
      credentials: "include",  // ✅ Sends session cookie
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)  // ✅ Fixed: was JSON.stringify(data)
    });

    if (res.status === 401) {
      alert("⚠️ Session expired. Please log in again.");
      window.location.href = "admin-login.html";
      return;
    }

    if (!res.ok) {
      const errorText = await res.text();
      console.error("❌ Failed to update settings:", res.status, errorText.substring(0, 200));
      throw new Error(`HTTP ${res.status}`);
    }

    const data = await res.json();

    msgEl.className = "message success";
    msgEl.textContent = "✅ Settings updated successfully";

    // ✅ Clear password fields only
    currentPasswordEl.value = "";
    newPasswordEl.value = "";
    confirmPasswordEl.value = "";

  } catch (err) {
    msgEl.className = "message error";
    msgEl.textContent = "❌ " + err.message;
    console.error(err);
  }
});

function togglePassword(fieldId, icon) {
  const input = document.getElementById(fieldId);
  if (input.type === "password") {
    input.type = "text";
    icon.textContent = "🙈";
  } else {
    input.type = "password";
    icon.textContent = "👁️";
  }
}
</script>

<script src="js/kaima-chatbot.js"></script>
<script src="js/session-timeout.js"></script>

</body>
</html>

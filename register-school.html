<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🏫 Register Your School | Gradely Info</title>

  <!-- Gradely Favicon -->
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">


  <style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:"Segoe UI",system-ui,sans-serif;
  min-height:100vh;
  background:
    radial-gradient(circle at top left,rgba(34,197,94,.22),transparent 35%),
    radial-gradient(circle at bottom right,rgba(0,210,255,.24),transparent 35%),
    linear-gradient(135deg,#020617,#0f172a);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:34px 14px 0;
}

.container{
  width:100%;
  max-width:570px;
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.22);
  border-radius:30px;
  padding:36px 30px;
  box-shadow:0 30px 90px rgba(0,0,0,.4);
  margin:30px auto;
}

h2{
  text-align:center;
  font-size:1.85rem;
  font-weight:900;
  margin-bottom:8px;
}

.container > p{
  text-align:center;
  color:#dbeafe;
  margin-bottom:26px;
  line-height:1.6;
}

form{
  display:flex;
  flex-direction:column;
  gap:14px;
}

label{
  font-weight:800;
  color:#e0f2fe;
  font-size:.92rem;
}

input{
  width:100%;
  min-height:52px;
  border:1px solid rgba(255,255,255,.25);
  border-radius:16px;
  padding:0 14px;
  font-size:1rem;
  outline:none;
  background:rgba(255,255,255,.14);
  color:#fff;
}

input::placeholder{
  color:#cbd5e1;
}

input:focus{
  border-color:#22c55e;
  box-shadow:0 0 0 5px rgba(34,197,94,.16);
}

.password-wrapper{
  position:relative;
}

.password-wrapper input{
  padding-right:48px;
}

.toggle-password{
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
}

.plan-status,
.redirect-status{
  display:none;
  text-align:center;
  font-weight:900;
}

button{
  width:100%;
  min-height:52px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#22c55e,#2563eb);
  color:#fff;
  font-size:1rem;
  font-weight:900;
  cursor:pointer;
}

#selectPlanBtn{
  background:linear-gradient(135deg,#00d2ff,#2563eb);
}

.terms-checkbox{
  display:flex;
  gap:10px;
  align-items:flex-start;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.22);
  border-radius:16px;
  padding:13px;
  font-size:.88rem;
  line-height:1.5;
}

.terms-checkbox input{
  width:auto;
  min-height:auto;
  margin-top:4px;
}

.terms-checkbox a{
  color:#00d2ff;
  font-weight:900;
}

.back-link{
  display:block;
  margin-top:24px;
  text-align:center;
  color:#00d2ff;
  text-decoration:none;
  font-weight:900;
}

footer{
  margin-top:auto;
  width:100%;
  text-align:center;
  padding:22px 10px;
  background:rgba(0,0,0,.22);
  border-top:1px solid rgba(255,255,255,.15);
  color:#e2e8f0;
  font-size:.82rem;
}

footer a{
  color:#00d2ff;
  text-decoration:none;
  margin:0 6px;
  font-weight:900;
}

@media(max-width:600px){
  body{padding:18px 10px 0}

  .container{
    padding:28px 16px;
    border-radius:24px;
    margin:18px auto 28px;
  }

  h2{font-size:1.45rem}

  input,
  button{
    font-size:16px;
  }

  footer{font-size:.74rem}
}
</style>
</head>
<body>
  <div class="container">
    <h2>🏫 Register Your School</h2>
    <p>Join hundreds of schools using <strong>gradely.info</strong> to share results digitally.</p>

    <form id="schoolForm">
      <label>School Name *</label>
      <input type="text" id="schoolName" placeholder="e.g., Elora Destiny International School" required />

      <label>Admin ID *</label>
      <input type="text" id="adminNumber" placeholder="e.g., ADM001" required />

      <label>Email *</label>
      <input type="email" id="email" placeholder="admin@school.edu.ng" required />

      <label>Phone (WhatsApp) *</label>
      <input type="text" id="phone" placeholder="+2348031234567" required />



      <label>Create Password *</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Enter password" required />
        <span class="toggle-password" onclick="togglePasswordVisibility('password')">👁️</span>
      </div>

      <label>Confirm Password *</label>
      <div class="password-wrapper">
        <input type="password" id="confirmPassword" placeholder="Re-enter password" required />
        <span class="toggle-password" onclick="togglePasswordVisibility('confirmPassword')">👁️</span>
      </div>

      <input type="hidden" id="plan" />

      <div class="plan-status" id="planStatus"></div>
      <button type="button" id="selectPlanBtn">
        Select Plan
      </button>

      <!-- ✅ NEW: Mandatory Terms Acceptance Checkbox -->
      <div class="terms-checkbox">
        <input type="checkbox" id="agreeTerms" required />
        <label for="agreeTerms" style="font-weight: normal; margin: 0; cursor: pointer;">
          I agree to the <a href="terms.html" target="_blank">Terms of Service</a>, including the 
          <a href="privacy.html" target="_blank">Privacy</a>. 
          and <a href="refund-policy.html" target="_blank">Refund policy</a>. 
          I understand violations may result in account suspension.
        </label>
      </div>

      <!-- Comment out the button bellow to ✅ Proceed to Payment</button> -->
      <button type="submit" id="submitBtn">✅ Proceed to Payment</button> 
      
      <!-- ✅ Redirect status message (hidden by default) -->
      <div class="redirect-status" id="redirectStatus"></div>

    </form>

    <!-- ✅ UPDATED: Link to index.html instead of history.back() -->
    <a href="index.html" class="back-link">← Back to Home</a>
  </div>

  <!-- Footer -->
  <footer>
    © <span class="currentYear"></span> <strong>gradely.info</strong> All rights reserved. | Powered by RIS<br>
    <a href="terms.html">Terms</a> • 
    <a href="privacy.html">Privacy</a> • 
    <a href="refund-policy.html">Refund Policy</a>
  </footer>

  <script>
  // ✅ FIXED: Clean API_BASE (NO trailing spaces)
  const API_BASE = "https://api.gradely.info";

  // ✅ Toggle password visibility
  function togglePasswordVisibility(fieldId) {
    const input = document.getElementById(fieldId);
    if (!input) return;
    
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    
    const wrapper = input.closest('.password-wrapper');
    if (wrapper) {
      const icon = wrapper.querySelector('.toggle-password');
      if (icon) {
        icon.textContent = isPassword ? '🙈' : '👁️';
      }
    }
  }

  // ✅ Wait for DOM to be ready
  document.addEventListener("DOMContentLoaded", () => {
    // ===============================
    // ✅ Restore plan selection from URL/session
    // ===============================
    const urlParams = new URLSearchParams(window.location.search);
    const planFromUrl = urlParams.get('plan');
    const planFromSession = sessionStorage.getItem('selected_plan');
    const selectedPlan = planFromUrl || planFromSession;
    
    const planInput = document.getElementById("plan");
    const planStatus = document.getElementById("planStatus");
    
    if (selectedPlan && (selectedPlan === 'basic' || selectedPlan === 'pro')) {
      if (planInput) planInput.value = selectedPlan;
      
      if (planStatus) {
        planStatus.textContent = `✅ ${selectedPlan.toUpperCase()} plan selected`;
        planStatus.style.display = "block";
        planStatus.style.color = selectedPlan === 'pro' ? '#ffd700' : '#00e676';
      }
      
      const selectPlanBtn = document.getElementById("selectPlanBtn");
      if (selectPlanBtn) {
        selectPlanBtn.textContent = `✓ ${selectedPlan.toUpperCase()} Selected — Change Plan`;
        selectPlanBtn.style.background = selectedPlan === 'pro' 
          ? 'linear-gradient(120deg, #ffd700, #ffaa00)' 
          : 'linear-gradient(120deg, #00e676, #00c853)';
      }
      
      if (planFromSession) sessionStorage.removeItem('selected_plan');
    }

    // ===============================
    // ✅ Form submit handler
    // ===============================
    const schoolForm = document.getElementById("schoolForm");
    if (schoolForm) {
      schoolForm.addEventListener("submit", (e) => {
        e.preventDefault();
        handleRegistration();
      });
    }

    // ===============================
    // ✅ Select Plan button
    // ===============================
    const selectPlanBtn = document.getElementById("selectPlanBtn");
    if (selectPlanBtn) {
      selectPlanBtn.addEventListener("click", () => {
        sessionStorage.setItem('register_form_data', JSON.stringify({
          schoolName: document.getElementById('schoolName')?.value,
          adminId: document.getElementById('adminNumber')?.value,
          email: document.getElementById('email')?.value,
          phone: document.getElementById('phone')?.value,
          password: document.getElementById('password')?.value,
          confirmPassword: document.getElementById('confirmPassword')?.value
        }));
        
        window.location.href = 'plan-comparison.html?new=true';
      });
    }
    
    // ===============================
    // ✅ Restore form data if returning from plan selection
    // ===============================
    const formData = sessionStorage.getItem('register_form_data');
    if (formData) {
      try {
        const data = JSON.parse(formData);
        if (data.schoolName) document.getElementById('schoolName').value = data.schoolName;
        if (data.adminId) document.getElementById('adminNumber').value = data.adminId;
        if (data.email) document.getElementById('email').value = data.email;
        if (data.phone) document.getElementById('phone').value = data.phone;
        if (data.password) document.getElementById('password').value = data.password;
        if (data.confirmPassword) document.getElementById('confirmPassword').value = data.confirmPassword;
        sessionStorage.removeItem('register_form_data');
      } catch (e) {
        console.warn("⚠️ Could not restore form data:", e);
      }
    }
  });

  // ===============================
  // ✅ Registration handler - CRITICAL FIX: Pass email to payment page
  // ===============================
  async function handleRegistration() {
    const submitBtn = document.getElementById("submitBtn");
    const redirectStatus = document.getElementById("redirectStatus");
    if (!submitBtn) return;
    
    // ✅ Check terms acceptance
    const agreeTerms = document.getElementById("agreeTerms");
    if (!agreeTerms || !agreeTerms.checked) {
      alert("⚠️ You must agree to the Terms of Service to continue.");
      resetSubmitBtn();
      return;
    }

    submitBtn.textContent = "⏳ Creating account...";
    submitBtn.disabled = true;

    // ✅ Gather form values
    const schoolName = document.getElementById("schoolName")?.value.trim() || "";
    const adminId = document.getElementById("adminNumber")?.value.trim().toLowerCase() || "";
    const email = document.getElementById("email")?.value.trim().toLowerCase() || "";
    const phone = document.getElementById("phone")?.value.trim() || "";
    const password = document.getElementById("password")?.value.trim() || "";
    const confirmPassword = document.getElementById("confirmPassword")?.value.trim() || "";



    // ✅ CRITICAL: Get plan from hidden input OR URL param (fallback)
    let subscriptionPlan = document.getElementById("plan")?.value?.trim() || "";
    if (!subscriptionPlan) {
      const urlParams = new URLSearchParams(window.location.search);
      subscriptionPlan = urlParams.get('plan')?.trim() || "";
    }
    subscriptionPlan = subscriptionPlan.toLowerCase(); 


    // ✅ Validate inputs
    if (!subscriptionPlan) {
      alert("⚠️ Please select a subscription plan first.");
      resetSubmitBtn();
      return;
    }

    if (!schoolName || !adminId || !email || !phone || !password || !confirmPassword) {
      alert("⚠️ Please fill in all fields.");
      resetSubmitBtn();
      return;
    }

    if (password !== confirmPassword) {
      alert("❌ Password does not match. Please try again.");
      resetSubmitBtn();
      return;
    }

    // ✅ Prepare request data
    const data = {
      school_name: schoolName,
      admin_id: adminId,
      email: email,
      phone: phone,
      password: password,
      subscription_plan: subscriptionPlan,
      terms_accepted: agreeTerms.checked
    };

    try {
      const res = await fetch(`${API_BASE}/api/school/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      let result;

      try {
      result = await res.json();
    } catch (jsonErr) {
       const text = await res.text();
       console.error("🚫 Non-JSON response:", text);

     alert("⚠️ Server returned an invalid response. Please contact support.");
     resetSubmitBtn();
     return;
    }
      console.log("✅ Registration response:", result);

      if (res.ok && result.success) {

        // ✅ Meta Pixel: School registration completed
if (window.fbq) {
  fbq('track', 'CompleteRegistration', {
    content_name: 'School Registration',
    status: 'Success'
  });
}

        // ✅ CRITICAL FIX: Pass EMAIL to payment page via URL parameter
        if (redirectStatus) {
          redirectStatus.textContent = "✅ Account created! Redirecting to payment...";
          redirectStatus.style.display = "block";
        }
        submitBtn.textContent = "🔄 Redirecting...";
        submitBtn.disabled = true;

        // ✅ Clean up session storage
        sessionStorage.removeItem("selected_plan");
        sessionStorage.removeItem("plan_return_url");
        sessionStorage.removeItem("register_form_data");

        // ✅ CRITICAL: Include email in redirect URL for payment flow
        const schoolId = result.data?.school_id || result.data?.admin_id;
        const adminId = result.data?.admin_id;
        
               // ✅ CRITICAL: Include referral_code in redirect URL for payment flow
        setTimeout(() => {
          window.location.href =
  `pay.html?school_id=${encodeURIComponent(schoolId)}` +
  `&plan=${encodeURIComponent(subscriptionPlan)}` +
  `&email=${encodeURIComponent(email)}` +
  `&admin_id=${encodeURIComponent(adminId)}` +
  `&new=true`;
        }, 1000);
        
      } else {
        alert("⚠️ " + (result.message || "Registration failed."));
        resetSubmitBtn();
      }
    } catch (err) {
      console.error("🚫 Registration error:", err);
      alert("⚠️ Could not connect to the server. Please check your internet or contact support.");
      resetSubmitBtn();
    }
  }

  // ===============================
  // ✅ Reset submit button
  // ===============================
  function resetSubmitBtn() {
    const submitBtn = document.getElementById("submitBtn");
    if (submitBtn) {
      submitBtn.textContent = "✅ Proceed to Payment";
      submitBtn.disabled = false;
    }
  }
</script>

  <script src="js/kaima-chatbot.js"></script>

<script>
  document.querySelectorAll(".currentYear").forEach(el => {
    el.textContent = new Date().getFullYear();
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🏫 Register Your School | Gradely Info</title>
  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      padding: 20px;
    }
    .container {
      background: rgba(255, 255, 255, 0.1);
      padding: 35px 25px;
      border-radius: 20px;
      width: 90%;
      max-width: 480px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      text-align: center;
    }
    h2 { margin-bottom: 10px; font-size: 1.8rem; color: #fff; }
    p { font-size: 0.95rem; margin-bottom: 20px; opacity: 0.9; }
    form { display: flex; flex-direction: column; gap: 18px; text-align: left; }
    label { font-weight: 600; font-size: 0.9rem; margin-bottom: 5px; color: #e8e8e8; }
    input, select, button {
      width: 100%; height: 42px; border-radius: 10px; border: none; outline: none;
      font-size: 1rem; padding: 0 14px; box-sizing: border-box; transition: all 0.3s ease;
    }
    input, select { background: rgba(255, 255, 255, 0.9); color: #333; }
    input::placeholder { color: #777; }
    input:focus, select:focus {
      border: 2px solid #00d2ff; background: white; box-shadow: 0 0 6px rgba(0,210,255,0.3);
    }
    select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23333'><path d='M7 10l5 5 5-5z'/></svg>");
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 16px;
      cursor: pointer;
    }
    button {
      background: #00d2ff; color: white; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
    }
    button:hover { background: #0a84ff; transform: scale(1.03); }
    button:active { transform: scale(0.98); }

    /* Test Mode Button */
    #skipPaymentBtn {
      background: #999;
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }
    #skipPaymentBtn.loading {
      background: #777;
      color: #ccc;
      pointer-events: none;
    }

    .back-link {
      display: block; margin-top: 20px; font-size: 0.9rem; color: #fff; text-decoration: none; opacity: 0.9; text-align: center;
    }
    .back-link:hover { text-decoration: underline; }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
      color: #eee;
      background: rgba(0, 0, 0, 0.1);
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      width: 100%;
      margin-top: auto;
    }

    footer a {
      color: #00d2ff;
      text-decoration: none;
      margin: 0 6px;
    }

    /* === Password Visibility Toggle === */
    .password-wrapper {
      position: relative;
      width: 100%;
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 1.2em;
      color: #666;
      user-select: none;
    }
    .toggle-password:hover {
      color: #0077b6;
    }

    /* Plan selection status - ONLY appears after selection */
    .plan-status {
      text-align: center;
      margin-top: -8px;
      margin-bottom: 8px;
      min-height: 22px;
      font-size: 0.9rem;
      color: #00e676;
      font-weight: 600;
      display: none; /* Hidden by default */
    }
    
    /* Terms acceptance checkbox styling */
    .terms-checkbox {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 10px 0;
      font-size: 0.9rem;
      color: #e8e8e8;
    }
    .terms-checkbox input {
      width: auto;
      height: auto;
      margin-top: 3px;
      min-width: 18px;
      min-height: 18px;
      cursor: pointer;
      accent-color: #22c55e; /* ✅ Green when checked */
      transition: all 0.2s ease;
    }
    .terms-checkbox input:checked {
      accent-color: #22c55e; /* ✅ Green when checked */
      transform: scale(1.1);
    }
    .terms-checkbox a {
      color: #00d2ff;
      text-decoration: none;
      font-weight: 600;
    }
    .terms-checkbox a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🏫 Register Your School</h2>
    <p>Join hundreds of schools using <strong>gradely.info</strong> to share results digitally.</p>

    <form id="schoolForm">
      <label>School Name *</label>
      <input type="text" id="schoolName" placeholder="e.g., Elora Destiny International School" required />

      <label>Admin ID *</label>
      <input type="text" id="adminNumber" placeholder="e.g., ADM001" required />

      <label>Email *</label>
      <input type="email" id="email" placeholder="admin@school.edu.ng" required />

      <label>Phone (WhatsApp) *</label>
      <input type="text" id="phone" placeholder="+2348031234567" required />

      <label>Create Password *</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Enter password" required />
        <span class="toggle-password" onclick="togglePasswordVisibility('password')">👁️</span>
      </div>

      <label>Confirm Password *</label>
      <div class="password-wrapper">
        <input type="password" id="confirmPassword" placeholder="Re-enter password" required />
        <span class="toggle-password" onclick="togglePasswordVisibility('confirmPassword')">👁️</span>
      </div>

      <input type="hidden" id="plan" />

      <div class="plan-status" id="planStatus"></div>
      <button type="button" id="selectPlanBtn">
        Select Plan
      </button>

      <!-- ✅ NEW: Mandatory Terms Acceptance Checkbox -->
      <div class="terms-checkbox">
        <input type="checkbox" id="agreeTerms" required />
        <label for="agreeTerms" style="font-weight: normal; margin: 0; cursor: pointer;">
          I agree to the <a href="terms.html" target="_blank">Terms of Service</a>, including the 
          <a href="privacy.html" target="_blank">Privacy</a>. 
          and <a href="refund-policy.html" target="_blank">Refund policy</a>. 
          I understand violations may result in account suspension.
        </label>
      </div>

      <!-- Comment out the button bellow to ✅ Proceed to Payment</button> -->
      <button type="submit" id="submitBtn">✅ Proceed to Payment</button> 

    </form>

    <!-- ✅ UPDATED: Link to index.html instead of history.back() -->
    <a href="index.html" class="back-link">← Back to Home</a>
  </div>

  <!-- Footer -->
  <footer>
    © 2026 <strong>gradely.info</strong>. All rights reserved. | Powered by RIS<br>
    <a href="terms.html">Terms</a> • 
    <a href="privacy.html">Privacy</a> • 
    <a href="refund-policy.html">Refund Policy</a>
  </footer>

  <script>
  // ✅ FIXED: Clean API_BASE (NO trailing spaces)
  const API_BASE = "https://api.gradely.info";

  // ✅ Wait for DOM to be ready before attaching event listeners
  document.addEventListener("DOMContentLoaded", () => {
    
    // ===============================
    // ✅ CONSOLIDATED: Auto-select plan from URL param OR sessionStorage
    // ===============================
    const urlParams = new URLSearchParams(window.location.search);
    const planFromUrl = urlParams.get('plan');
    const planFromSession = sessionStorage.getItem('selected_plan');
    
    // ✅ Determine which plan to use (URL param takes priority, then sessionStorage)
    const selectedPlan = planFromUrl || planFromSession;
    
    const planInput = document.getElementById("plan");
    const planStatus = document.getElementById("planStatus");
    
    // ✅ Set plan value and show status if plan is selected
    if (selectedPlan && (selectedPlan === 'basic' || selectedPlan === 'pro')) {
      // ✅ Set hidden input value
      if (planInput) {
        planInput.value = selectedPlan;
      }
      
      // ✅ Show visual feedback
      if (planStatus) {
        planStatus.textContent = `✅ ${selectedPlan.toUpperCase()} plan selected`;
        planStatus.style.display = "block";
        planStatus.style.color = selectedPlan === 'pro' ? '#ffd700' : '#00e676';
      }
      
      // ✅ Optional: Update "Select Plan" button text to show current selection
      const selectPlanBtn = document.getElementById("selectPlanBtn");
      if (selectPlanBtn) {
        selectPlanBtn.textContent = `✓ ${selectedPlan.toUpperCase()} Selected — Change Plan`;
        selectPlanBtn.style.background = selectedPlan === 'pro' 
          ? 'linear-gradient(120deg, #ffd700, #ffaa00)' 
          : 'linear-gradient(120deg, #00e676, #00c853)';
      }
      
      // ✅ Clear sessionStorage after using (prevents stale data on refresh)
      if (planFromSession) {
        sessionStorage.removeItem('selected_plan');
      }
    }

    // ===============================
    // ✅ Password visibility toggle
    // ===============================
    const togglePasswordBtns = document.querySelectorAll(".toggle-password");
    togglePasswordBtns.forEach(btn => {
      btn.addEventListener("click", function() {
        const inputId = this.getAttribute("onclick")?.match(/'(\w+)'/)?.[1];
        if (!inputId) return;
        
        const input = document.getElementById(inputId);
        if (!input) return;
        
        const isPassword = input.getAttribute('type') === 'password';
        input.setAttribute('type', isPassword ? 'text' : 'password');
        this.textContent = isPassword ? '🙈' : '👁️';
      });
    });

    // ===============================
    // ✅ Form submit handler
    // ===============================
    const schoolForm = document.getElementById("schoolForm");
    if (schoolForm) {
      schoolForm.addEventListener("submit", (e) => {
        e.preventDefault();
        handleRegistration();
      });
    }

    // ===============================
    // ✅ Select Plan button (navigate to plan comparison)
    // ===============================
    const selectPlanBtn = document.getElementById("selectPlanBtn");
    if (selectPlanBtn) {
      selectPlanBtn.addEventListener("click", () => {
        // ✅ Save current form data so user doesn't lose it when going to plan selection
        sessionStorage.setItem('register_form_data', JSON.stringify({
          schoolName: document.getElementById('schoolName')?.value,
          adminId: document.getElementById('adminNumber')?.value,
          email: document.getElementById('email')?.value,
          phone: document.getElementById('phone')?.value
        }));
        
        // ✅ Redirect to plan comparison with new=true flag
        window.location.href = 'plan-comparison.html?new=true';
      });
    }
    
    // ===============================
    // ✅ Restore form data if user returns from plan selection
    // ===============================
    const formData = sessionStorage.getItem('register_form_data');
    if (formData) {
      try {
        const data = JSON.parse(formData);
        if (data.schoolName) document.getElementById('schoolName').value = data.schoolName;
        if (data.adminId) document.getElementById('adminNumber').value = data.adminId;
        if (data.email) document.getElementById('email').value = data.email;
        if (data.phone) document.getElementById('phone').value = data.phone;
        
        // ✅ Clear after restoring (one-time use)
        sessionStorage.removeItem('register_form_data');
      } catch (e) {
        console.warn("⚠️ Could not restore form data:", e);
      }
    }

  }); // ✅ End of DOMContentLoaded

  // ===============================
  // ✅ Registration handler (payment required only)
  // ===============================
  async function handleRegistration() {
    const submitBtn = document.getElementById("submitBtn");
    if (!submitBtn) return;
    
    // ✅ Check terms acceptance
    const agreeTerms = document.getElementById("agreeTerms");
    if (!agreeTerms || !agreeTerms.checked) {
      alert("⚠️ You must agree to the Terms of Service to continue.");
      resetSubmitBtn();
      return;
    }

    // ✅ Set button to loading state
    submitBtn.textContent = "⏳ Registering...";
    submitBtn.disabled = true;

    // ✅ Gather form values
    const schoolNameEl = document.getElementById("schoolName");
    const adminIdEl = document.getElementById("adminNumber");
    const emailEl = document.getElementById("email");
    const phoneEl = document.getElementById("phone");
    const passwordEl = document.getElementById("password");
    const confirmPasswordEl = document.getElementById("confirmPassword");
    const planEl = document.getElementById("plan");

    const school_name = schoolNameEl?.value.trim() || "";
    const admin_id = adminIdEl?.value.trim() || "";
    const email = emailEl?.value.trim() || "";
    const phone = phoneEl?.value.trim() || "";
    const password = passwordEl?.value.trim() || "";
    const confirm_password = confirmPasswordEl?.value.trim() || "";
    const subscription_plan = planEl?.value || "";

    // ✅ Validate inputs
    if (!subscription_plan) {
      alert("⚠️ Please select a subscription plan first.");
      resetSubmitBtn();
      return;
    }

    if (!school_name || !admin_id || !email || !phone || !password || !confirm_password) {
      alert("⚠️ Please fill in all fields.");
      resetSubmitBtn();
      return;
    }

    if (password !== confirm_password) {
      alert("❌ Password does not match. Please try again.");
      resetSubmitBtn();
      return;
    }

    // ✅ Prepare request data
    const data = {
      school_name,
      admin_id,
      email,
      phone,
      password,
      subscription_plan,
      terms_accepted: agreeTerms.checked
    };

    try {
      const res = await fetch(`${API_BASE}/api/admin/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      const result = await res.json();
      console.log("✅ Server response:", result);

      if (res.ok && result.success) {
        alert("✅ Registration successful!");

        // Clean up session storage
        sessionStorage.removeItem("selected_plan");
        sessionStorage.removeItem("plan_return_url");
        sessionStorage.removeItem("register_form_data");

        // ✅ Redirect to payment page with ALL required params
        window.location.href = `pay.html?school_id=${encodeURIComponent(result.school_id)}&admin_id=${encodeURIComponent(result.admin_id)}&plan=${encodeURIComponent(subscription_plan)}&new=true`;
      } else {
        alert("⚠️ " + (result.message || "Registration failed."));
        resetSubmitBtn();
      }
    } catch (err) {
      console.error("🚫 Registration error:", err);
      alert("⚠️ Could not connect to the server. Please check your internet or contact support.");
      resetSubmitBtn();
    }
  }

  // ===============================
  // ✅ Reset submit button to default state
  // ===============================
  function resetSubmitBtn() {
    const submitBtn = document.getElementById("submitBtn");
    if (submitBtn) {
      submitBtn.textContent = "✅ Proceed to Payment";
      submitBtn.disabled = false;
    }
  }
</script>

  <script src="js/kaima-chatbot.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parent Login | Gradely.info</title>
  <style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --primary:#38bdf8;
  --primary-dark:#2563eb;
  --gold:#ffd700;
  --green:#22c55e;
  --dark:#020617;
  --white:#ffffff;
  --muted:#dbeafe;
  --glass:rgba(255,255,255,.1);
  --border:rgba(255,255,255,.18);
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  color:#fff;
  overflow-x:hidden;

  background:
    linear-gradient(135deg,rgba(2,6,23,.84),rgba(21,128,61,.6)),
    url("https://images.pexels.com/photos/8613089/pexels-photo-8613089.jpeg?auto=compress&cs=tinysrgb&w=1600");

  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left,rgba(34,197,94,.3),transparent 35%),
    radial-gradient(circle at bottom right,rgba(0,210,255,.25),transparent 35%);
  pointer-events:none;
  z-index:-1;
}

.top-nav{
  width:100%;
  padding:22px 24px 0;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  z-index:10;
}

.top-nav a{
  color:#ffffff;
  text-decoration:none;
  font-size:.9rem;
  font-weight:800;
  padding:10px 15px;

  border-radius:999px;

  background:rgba(255,255,255,.12);

  border:1px solid rgba(255,255,255,.25);

  backdrop-filter:blur(16px);

  box-shadow:
    0 8px 25px rgba(0,0,0,.18);

  transition:.25s ease;
}

.top-nav a:hover{
  color:#00d2ff;
  background:rgba(255,255,255,.22);
  transform:translateY(-2px);
}

main{
  flex:1;
  width:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:28px 20px;
  text-align:center;
}

header{
  margin-bottom:32px;
  padding:22px 28px;
  border-radius:26px;
  background:rgba(2,6,23,.28);
  border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(18px);
}

header h1{
  font-size:2.5rem;
  line-height:1.1;
  font-weight:900;
  letter-spacing:-1.2px;
  margin-bottom:8px;
}

.info-text,
.footer-info{
  color:var(--gold);
  font-weight:900;
}

header p{
  color:#e2e8f0;
  font-size:1.05rem;
  font-weight:400;
  line-height:1.6;
}

.login-container{
  width:100%;
  max-width:460px;
  padding:40px 32px;
  border-radius:32px;
  background:rgba(2,6,23,.36);
  border:1px solid rgba(255,255,255,.18);
  backdrop-filter:blur(28px);
  box-shadow:0 35px 90px rgba(0,0,0,.48);
  animation:fadeIn .9s ease;
}

.login-container h2{
  font-size:1.9rem;
  margin-bottom:26px;
  color:#fff;
  letter-spacing:-.5px;
}

.form-group{
  margin-bottom:20px;
  text-align:left;
}

.form-group label{
  display:block;
  margin-bottom:8px;
  font-weight:700;
  color:#e2e8f0;
}

.form-group input{
  width:100%;
  height:56px;
  padding:0 16px;
  border:none;
  outline:none;
  border-radius:16px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.18);
  color:#fff;
  font-size:1rem;
  transition:.25s ease;
}

.form-group input::placeholder{
  color:rgba(255,255,255,.5);
}

.form-group input:focus{
  border-color:#38bdf8;
  box-shadow:0 0 0 5px rgba(56,189,248,.16);
  background:rgba(255,255,255,.16);
}

.password-wrapper{
  position:relative;
}

.password-wrapper input{
  padding-right:58px;
}

.toggle-password{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  cursor:pointer;
  color:#fff;
  font-size:1.15rem;
  user-select:none;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.16);
  transition:.25s ease;
}

.toggle-password:hover{
  color:#00d2ff;
  background:rgba(255,255,255,.18);
}

.btn{
  width:100%;
  height:56px;
  margin-top:8px;
  border:none;
  border-radius:16px;
  background:linear-gradient(135deg,#38bdf8,#2563eb);
  color:#fff;
  font-size:1rem;
  font-weight:900;
  cursor:pointer;
  transition:.25s ease;
  box-shadow:0 18px 35px rgba(0,0,0,.25);
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 25px 50px rgba(0,0,0,.32);
}

.btn:disabled{
  opacity:.7;
  cursor:not-allowed;
  transform:none;
}

.options{
  margin-top:22px;
  font-size:.95rem;
  color:#e2e8f0;
}

.options a{
  color:#ffd700;
  text-decoration:none;
  font-weight:800;
}

.options a:hover{
  color:#fff;
  text-decoration:underline;
}

.admin-link{
  margin-top:16px !important;
}

.admin-link a{
  color:#00d2ff;
}

footer{
  width:100%;
  padding:16px 20px;
  text-align:center;
  background:rgba(2,6,23,.38);
  border-top:1px solid rgba(255,255,255,.16);
  backdrop-filter:blur(18px);
  color:#e2e8f0;
  font-size:.88rem;
  line-height:1.7;
}

footer img{
  height:26px;
  vertical-align:middle;
  margin-right:8px;
}

.footer-links{
  margin-top:8px;
}

.footer-links a{
  color:#00d2ff;
  text-decoration:none;
  margin:0 6px;
  font-weight:800;
}

.footer-links a:hover{
  color:#fff;
  text-decoration:underline;
}

/* LOGIN BUTTON SPINNER */
.btn .spinner{
  display:none;
  width:18px;
  height:18px;
  border:2px solid rgba(255,255,255,.4);
  border-top:2px solid #fff;
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin:0 auto;
}

.btn.loading .btn-text{
  display:none;
}

.btn.loading .spinner{
  display:block;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(24px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes spin{
  from{
    transform:rotate(0deg);
  }
  to{
    transform:rotate(360deg);
  }
}

/* TABLETS */
@media(max-width:900px){
  body{
    background-attachment:scroll;
  }

  .top-nav{
    justify-content:center;
    padding:18px 16px 0;
  }

  main{
    padding:26px 16px;
  }

  header{
    margin-bottom:28px;
  }

  header h1{
    font-size:2.2rem;
  }
}

/* MOBILE */
@media(max-width:600px){

  .top-nav{
    justify-content:center;
    gap:10px;
    padding:16px 10px 0;
  }

  .top-nav a{
    font-size:.85rem;
    padding:10px 14px;
    min-width:110px;
    text-align:center;
  }


  main{
    justify-content:flex-start;
    padding:24px 12px;
  }

  header{
    width:100%;
    padding:18px 16px;
    border-radius:22px;
    margin-bottom:22px;
  }

  header h1{
    font-size:1.85rem;
  }

  header p{
    font-size:.95rem;
  }

  .login-container{
    padding:30px 20px;
    border-radius:26px;
  }

  .login-container h2{
    font-size:1.55rem;
  }

  .form-group input,
  .btn{
    height:52px;
    border-radius:14px;
  }

  footer{
    font-size:.78rem;
    padding:14px 10px;
  }

  footer img{
    height:24px;
  }

  .footer-links a{
    display:inline-block;
    margin:2px 4px;
  }
}

/* VERY SMALL PHONES */
@media(max-width:360px){
  .top-nav a{
    font-size:.74rem;
    padding:7px 8px;
  }

  header h1{
    font-size:1.6rem;
  }

  .login-container{
    padding:26px 16px;
  }

  .btn{
    font-size:.92rem;
  }

  footer{
    font-size:.72rem;
  }
}
</style>
</head>
<body>
  <!-- Top Navigation -->
  <div class="top-nav">
    <a href="index.html">🏠 Home</a>
    <a href="about.html">ℹ️ About Us</a>
    <a href="contact.html">📞 Contact</a>
  </div>

  <main>
    <header>
      <!-- ✅ FIXED MISSING CLOSING TAG + GOLDEN .info -->
      <h1>gradely<span class="info-text">.info</span></h1>
      <!-- ✅ REMOVED BOLD FROM PARAGRAPH -->
      <p>Access your child's academic records and performance reports</p>
    </header>

    <div class="login-container">
      <h2>🔐 Parent Portal</h2>
      
      <div class="form-group">
        <label for="studentId">Student ID</label>
        <input type="text" id="studentId" placeholder="Enter student ID" autocomplete="username">
      </div>
      
      <!-- ✅ PASSWORD FIELD WITH TOGGLE ICON -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
          <span class="toggle-password" id="togglePassword">👁️</span>
        </div>
      </div>
      
      <!-- ✅ UPDATED BUTTON TEXT -->
      <button class="btn" id="loginBtn">
      <span class="btn-text">Login</span>
       <span class="spinner"></span>
     </button>
      
      <div class="options">
        <p>Forgot password? <a href="forgot-password.html">Reset here</a></p>
        <!-- ✅ PARENT LOGIN: Simple back link ONLY (no signup prompt) -->
<div class="admin-link" style="margin-top: 15px;">
  <a href="index.html">← Back to Home</a>
</div>
    </div>
  </main>

  <footer>
    <div>
      <img 
        src="https://i.postimg.cc/c4M6ZLSv/ris-removebg-preview.png" 
        alt="RIS Logo" 
      >
      © <span class="currentYear"></span> <strong>gradely.info</strong> | Powered by RIS
    </div>
    
    <div class="footer-links">
      <a href="terms.html">Terms</a> •
      <a href="privacy.html">Privacy</a> •
      <a href="cookies.html">Cookie Policy</a>
    </div>
  </footer>

  <script src="js/kaima-chatbot.js"></script>
  <script>
    // ✅ PASSWORD TOGGLE FUNCTIONALITY
    document.getElementById('togglePassword').addEventListener('click', function() {
      const passwordField = document.getElementById('password');
      const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordField.setAttribute('type', type);
      this.textContent = type === 'password' ? '👁️' : '🙈';
    });

    document.getElementById('loginBtn').addEventListener('click', function() {
  const studentId = document.getElementById('studentId').value.trim().toLowerCase();
  const password = document.getElementById('password').value.trim();
  const loginBtn = document.getElementById('loginBtn');
  
  if (!studentId || !password) {
    alert('Please enter both Student ID and Password');
    return;
  }
  
  // ✅ Show loading state
  loginBtn.classList.add('loading');
  loginBtn.disabled = true;
  
  fetch('https://api.gradely.info/api/auth/parent-login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ student_id: studentId, password: password })
  })
  .then(response => response.json())
    .then(data => {
    // ✅ First check if login was successful
    if (!data.success) {
      alert('Login failed: ' + (data.message || 'Please check your credentials'));
      loginBtn.classList.remove('loading');
      loginBtn.disabled = false;
      return;
    }
    
    // ✅ Safely access nested parent object
    const parent = data.parent || data.student || {};
    
    if (!parent.student_id) {
      console.error('❌ Parent data missing student_id:', data);
      alert('Account data incomplete. Please contact your school.');
      loginBtn.classList.remove('loading');
      loginBtn.disabled = false;
      return;
    }
    
    // ✅ Safe storage and redirect
    const studentToken =
  data.token ||
  data.student_token ||
  data.parent_token ||
  "";

if (!studentToken) {
  console.error("❌ Student token missing from login response:", data);
  alert("Login succeeded, but student session token is missing. Please contact admin.");
  loginBtn.classList.remove("loading");
  loginBtn.disabled = false;
  return;
}

localStorage.setItem("student_token", studentToken);
sessionStorage.setItem("student_token", studentToken);

localStorage.setItem("studentId", parent.student_id);
sessionStorage.setItem("studentId", parent.student_id);

localStorage.setItem("studentData", JSON.stringify(parent));

window.location.href = "student.html";
  })
  
  .catch(error => {
    console.error('Login error:', error);
    alert('Login failed. Please check your credentials and try again.');
    // ✅ Re-enable button on error
    loginBtn.classList.remove('loading');
    loginBtn.disabled = false;
  });
});
    
    // Allow Enter key to submit
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('loginBtn').click();
      }
    });
  </script>


<script>
  document.querySelectorAll(".currentYear").forEach(el => {
    el.textContent = new Date().getFullYear();
  });
</script>


</body>
</html>

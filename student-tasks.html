  border:1px solid rgba(96,165,250,0.3);

<body>

<div class="main-content">
  <div class="container">
    <div class="header">
      <h1>📝 Student Tasks</h1>
      <p>Assignments, homework, quizzes, and class tests posted by your school.</p>
    </div>

    <div id="taskList" class="empty">Loading tasks...</div>
  </div>
</div>

<!-- Back button section - outside main content -->
<div class="back-section">
  <div class="back-container">
    <a class="back-link" href="parent-dashboard.html">← Back to Dashboard</a>
  </div>
</div>

  © <span class="currentYear"></span> <strong>gradely.info</strong> | Powered by RIS<br>
  <a href="terms.html">Terms</a> • 
  <a href="dpa.html">DPA</a> • 
  <a href="privacy.html">Privacy Policy</a>
</footer>

<script>
const API_BASE = "https://api.gradely.info";

function getStudentId(){
  return localStorage.getItem("studentId") || sessionStorage.getItem("studentId");
}

function getStudentToken(){
  return localStorage.getItem("student_token") || sessionStorage.getItem("student_token");
}

function logout(){
  localStorage.removeItem("student_token");
  sessionStorage.removeItem("student_token");
  localStorage.removeItem("studentId");
  sessionStorage.removeItem("studentId");
  window.location.href = "parent-login.html";
}

async function loadTasks(){
  const studentId = getStudentId();
  const token = getStudentToken();

  if(!studentId || !token){
    logout();
    return;
  }

  try{
    const res = await fetch(`${API_BASE}/api/assignments-tests/parent/${studentId}`);
    const data = await res.json();

    const box = document.getElementById("taskList");

    if(!data.success || !data.assignments_tests || data.assignments_tests.length === 0){
      box.className = "empty";
      box.innerHTML = "No tasks posted yet.";
      return;
    }

    box.className = "";
    box.innerHTML = data.assignments_tests.map(t => {
  const instructions =
    t.instructions ||
    t.instruction ||
    t.description ||
    t.remarks ||
    "No instructions provided.";

  return `
    <div class="card">
      <h3>${t.type || "Task"}: ${t.title || t.subject || "Untitled"}</h3>

      <div class="meta">
        <strong>Subject:</strong> ${t.subject || "-"}<br>
        <strong>Class:</strong> ${t.class_name || "-"} ${t.section ? "• Group " + t.section : ""}<br>
        ${t.due_date ? `<strong>Due:</strong> ${new Date(t.due_date).toLocaleDateString()}<br>` : ""}
        ${t.total_marks ? `<strong>Total Marks:</strong> ${t.total_marks}` : ""}
      </div>

      <div class="text" style="margin-top:12px;">
        <strong>Instructions:</strong><br>
        ${instructions}
      </div>
    </div>
  `;
}).join("");
  }catch(err){
    document.getElementById("taskList").innerHTML = "Unable to load tasks.";
  }
}

document.addEventListener("DOMContentLoaded", () => {
  loadTasks();
  document.querySelectorAll(".currentYear").forEach(el => el.textContent = new Date().getFullYear());
});
</script>

<script src="js/kaima-chatbot.js"></script>

</body>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Students</title>

  <!-- Gradely Favicon -->
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <style>
body{
  background:#f4f7fb;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  font-family:'Segoe UI',system-ui,sans-serif;
}

.container{
  margin-top:45px;
  flex:1;
  max-width:1150px;
}

h4{
  font-weight:800;
  color:#0f172a;
}

.table-responsive{
  background:#fff;
  border-radius:18px;
  padding:14px;
  box-shadow:0 12px 35px rgba(15,23,42,.08);
}

table{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  margin-bottom:0;
}

th{
  background:#0f172a!important;
  color:#fff!important;
  font-size:.9rem;
  white-space:nowrap;
}

td{
  vertical-align:middle;
  font-size:.9rem;
}

tr:hover{
  background:#f8fafc;
}

.form-control{
  border-radius:10px;
  min-height:42px;
}

.btn{
  border-radius:10px;
  font-weight:700;
}

.btn-success{
  background:#22c55e;
  border-color:#22c55e;
}

.btn-primary{
  background:#2563eb;
  border-color:#2563eb;
}

.btn-danger{
  background:#ef4444;
  border-color:#ef4444;
}

.modal-content{
  border:none;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 25px 70px rgba(15,23,42,.25);
}

.modal-header{
  padding:18px 22px;
}

.modal-body{
  padding:22px;
}

.modal-footer{
  padding:16px 22px;
}

footer{
  text-align:center;
  padding:20px;
  font-size:.85rem;
  background:#0f172a;
  color:#e5e7eb;
  margin-top:auto;
}

footer a{
  color:#60a5fa;
  text-decoration:none;
  margin:0 6px;
  font-weight:700;
}

footer a:hover{
  color:#fff;
}

@media(max-width:768px){
  .container{
    margin-top:28px;
    padding:0 12px;
  }

  .container > .d-flex:first-child{
    flex-direction:column;
    align-items:flex-start!important;
    gap:12px;
  }

  .container > .d-flex:nth-child(2){
    flex-direction:column;
    gap:12px;
  }

  .container > .d-flex:nth-child(2) > .d-flex{
    flex-direction:column;
    width:100%;
  }

  #searchInput{
    max-width:100%!important;
    width:100%;
  }

  .btn{
    width:100%;
  }

  table{
    min-width:720px;
  }

  td .btn{
    width:auto;
    margin:2px 0;
  }

  footer{
    font-size:.76rem;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Manage Students</h4>
    <a href="dashboard.html" class="btn btn-primary btn-sm">⬅ Dashboard</a>
  </div>

  <div class="d-flex justify-content-between mb-3">
    <button class="btn btn-success" onclick="window.location.href='create-student.html'">➕ Add Student</button>

    <div class="d-flex gap-2">
      <input type="text" id="searchInput" class="form-control" placeholder="Search by ID or Name" style="max-width:200px;">
      <button id="searchBtn" class="btn btn-primary">Search</button>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>ID</th>
          <th>Full Name</th>
          <th>Phone</th>
          <th>Parent Email</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="studentsTableBody">
        <tr><td colspan="5" class="text-center">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal fade" id="editStudentModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5>Edit Student</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editStudentId">

        <div class="mb-2">
          <label>First Name</label>
          <input type="text" id="editFirstName" class="form-control">
        </div>

        <div class="mb-2">
          <label>Middle Name</label>
          <input type="text" id="editMiddleName" class="form-control">
        </div>

        <div class="mb-2">
          <label>Last Name</label>
          <input type="text" id="editLastName" class="form-control">
        </div>

        <div class="mb-2">
          <label>Phone</label>
          <input type="text" id="editPhone" class="form-control">
        </div>

        <div class="mb-2">
          <label>Parent Email</label>
          <input type="email" id="editParentEmail" class="form-control">
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-success" id="saveEditBtn">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<footer>
  &copy; © <span class="currentYear"></span> <strong>gradely.info</strong> All rights reserved.<br>
  <a href="terms.html">Terms</a> •
  <a href="privacy.html">Privacy</a> •
  <a href="refund-policy.html">Refund Policy</a>
</footer>

<script>
const API_BASE = "https://api.gradely.info";

const tableBody = document.getElementById("studentsTableBody");
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");
const modal = new bootstrap.Modal(document.getElementById("editStudentModal"));

let allStudents = [];

function getToken() {
  const token =
    sessionStorage.getItem("gradely_token") ||
    localStorage.getItem("gradely_token");

  if (!token || token === "null" || token === "undefined" || token.trim() === "") {
    return null;
  }

  return token;
}

function getSchoolId() {
  return (
    sessionStorage.getItem("school_id") ||
    localStorage.getItem("school_id") ||
    sessionStorage.getItem("admin_id") ||
    sessionStorage.getItem("adminId") ||
    localStorage.getItem("admin_id") ||
    localStorage.getItem("adminId")
  );
}

function clearAuth() {
  sessionStorage.removeItem("gradely_token");
  sessionStorage.removeItem("school_id");
  sessionStorage.removeItem("adminId");
  sessionStorage.removeItem("admin_id");

  localStorage.removeItem("gradely_token");
  localStorage.removeItem("school_id");
  localStorage.removeItem("adminId");
  localStorage.removeItem("admin_id");
}

function redirectToLogin() {
  clearAuth();
  window.location.href = "admin-login.html";
}

function getAuthHeaders(extraHeaders = {}) {
  return {
    "Content-Type": "application/json",
    Authorization: `Bearer ${getToken()}`,
    ...extraHeaders
  };
}

async function authFetch(url, options = {}) {
  if (!getToken()) {
    redirectToLogin();
    return null;
  }

  const res = await fetch(url, {
    ...options,
    headers: {
      ...getAuthHeaders(),
      ...(options.headers || {})
    }
  });

  if (res.status === 401) {
    redirectToLogin();
    return null;
  }

  if (!res.ok) {
    let message = `HTTP ${res.status}`;

    try {
      const errorData = await res.json();
      message = errorData.message || message;
    } catch (e) {}

    throw new Error(message);
  }

  return res;
}

function getSafeSchoolId() {
  const schoolId = getSchoolId();

  if (!schoolId) {
    tableBody.innerHTML = `
      <tr>
        <td colspan="5" class="text-danger text-center">
          ❌ School ID not found. Please log in again.
        </td>
      </tr>
    `;
    return null;
  }

  return schoolId;
}

/* LOAD STUDENTS */
async function loadStudents() {
  const schoolId = getSafeSchoolId();
  if (!schoolId) return;

  tableBody.innerHTML = `
    <tr>
      <td colspan="5" class="text-center">Loading...</td>
    </tr>
  `;

  try {
    const res = await authFetch(
      `${API_BASE}/api/manage-students/${encodeURIComponent(schoolId)}`,
      { method: "GET" }
    );

    if (!res) return;

    const data = await res.json();

    if (!data.success || !data.students || !data.students.length) {
      allStudents = [];
      tableBody.innerHTML = `
        <tr>
          <td colspan="5" class="text-center text-warning">
            ⚠️ No students found.
          </td>
        </tr>
      `;
      return;
    }

    allStudents = data.students;
    renderTable(allStudents);
  } catch (err) {
    console.error("Load students error:", err);

    tableBody.innerHTML = `
      <tr>
        <td colspan="5" class="text-danger text-center">
          ❌ Failed to load students: ${err.message}
        </td>
      </tr>
    `;
  }
}

/* RENDER TABLE */
function renderTable(list) {
  if (!list || list.length === 0) {
    tableBody.innerHTML = `
      <tr>
        <td colspan="5" class="text-center text-warning">
          ⚠️ No students found.
        </td>
      </tr>
    `;
    return;
  }

  tableBody.innerHTML = list.map(s => `
    <tr>
      <td>${s.student_id || "-"}</td>
      <td>${s.first_name || ""} ${s.middle_name || ""} ${s.last_name || ""}</td>
      <td>${s.phone || "-"}</td>
      <td>${s.parent_email || "-"}</td>
      <td>
        <button class="btn btn-sm btn-primary" onclick="editStudent('${s.student_id}')">
          Edit
        </button>
        <button class="btn btn-sm btn-danger" onclick="deleteStudent('${s.student_id}')">
          Delete
        </button>
      </td>
    </tr>
  `).join("");
}

/* SEARCH */
async function handleSearch() {
  const schoolId = getSafeSchoolId();
  if (!schoolId) return;

  const query = searchInput.value.trim();

  if (!query) {
    loadStudents();
    return;
  }

  tableBody.innerHTML = `
    <tr>
      <td colspan="5" class="text-center">Searching...</td>
    </tr>
  `;

  try {
    const res = await authFetch(
      `${API_BASE}/api/manage-students/${encodeURIComponent(schoolId)}/search/${encodeURIComponent(query)}`,
      { method: "GET" }
    );

    if (!res) return;

    const data = await res.json();

    if (!data.success || !data.students || !data.students.length) {
      tableBody.innerHTML = `
        <tr>
          <td colspan="5" class="text-center text-warning">
            ⚠️ No student found.
          </td>
        </tr>
      `;
      return;
    }

    allStudents = data.students;
    renderTable(allStudents);
  } catch (err) {
    console.error("Search students error:", err);

    tableBody.innerHTML = `
      <tr>
        <td colspan="5" class="text-danger text-center">
          ❌ Search failed: ${err.message}
        </td>
      </tr>
    `;
  }
}

searchBtn.onclick = handleSearch;

searchInput.onkeydown = e => {
  if (e.key === "Enter") handleSearch();
};

/* EDIT */
function editStudent(id) {
  const s = allStudents.find(x => x.student_id === id);

  if (!s) {
    alert("Student record not found. Please refresh and try again.");
    return;
  }

  document.getElementById("editStudentId").value = s.student_id;
  document.getElementById("editFirstName").value = s.first_name || "";
  document.getElementById("editMiddleName").value = s.middle_name || "";
  document.getElementById("editLastName").value = s.last_name || "";
  document.getElementById("editPhone").value = s.phone || "";
  document.getElementById("editParentEmail").value = s.parent_email || "";

  modal.show();
}

/* SAVE EDIT */
document.getElementById("saveEditBtn").onclick = async () => {
  const schoolId = getSafeSchoolId();
  if (!schoolId) return;

  const studentId = document.getElementById("editStudentId").value;

  const payload = {
    first_name: document.getElementById("editFirstName").value.trim(),
    middle_name: document.getElementById("editMiddleName").value.trim(),
    last_name: document.getElementById("editLastName").value.trim(),
    phone: document.getElementById("editPhone").value.trim(),
    parent_email: document.getElementById("editParentEmail").value.trim().toLowerCase(),
    school_id: schoolId
  };

  if (!payload.first_name || !payload.last_name) {
    alert("First name and last name are required.");
    return;
  }

  try {
    const res = await authFetch(`${API_BASE}/api/students/${encodeURIComponent(studentId)}`, {
      method: "PUT",
      body: JSON.stringify(payload)
    });

    if (!res) return;

    modal.hide();
    await loadStudents();
    alert("✅ Student updated successfully.");
  } catch (err) {
    console.error("Update student error:", err);
    alert("❌ Failed to update student: " + err.message);
  }
};

/* DELETE */
async function deleteStudent(id) {
  const schoolId = getSafeSchoolId();
  if (!schoolId) return;

  if (!confirm("⚠️ Are you sure you want to delete this student? This action cannot be undone.")) {
    return;
  }

  try {
    const res = await authFetch(
      `${API_BASE}/api/students/${encodeURIComponent(id)}?school_id=${encodeURIComponent(schoolId)}`,
      { method: "DELETE" }
    );

    if (!res) return;

    await loadStudents();
    alert("✅ Student deleted successfully.");
  } catch (err) {
    console.error("Delete student error:", err);
    alert("❌ Failed to delete student: " + err.message);
  }
}

document.addEventListener("DOMContentLoaded", () => {
  if (!getToken()) {
    redirectToLogin();
    return;
  }

  loadStudents();
});
</script>

<script src="js/kaima-chatbot.js"></script>

<script>
  document.querySelectorAll(".currentYear").forEach(el => {
    el.textContent = new Date().getFullYear();
  });
</script>

</body>
</html>
